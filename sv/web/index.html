<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>暗宇宙 · ShadowVerse</title>
<style>
:root{
  --bg:#08080f; --bg-glow1:#1c1640; --bg-glow2:#0c2330;
  --surface:#13131f; --surface2:#191926; --surface3:#20203140;
  --line:#262640; --line-soft:#1e1e30;
  --ink:#edecf6; --dim:#a6a6cc; --faint:#6b6b8f;
  --violet:#a98bff; --violet-d:#7a5cf0; --cyan:#5fe3d2; --gold:#ffce86; --rose:#ff8fb0;
  --good:#62e6a4; --bad:#ff6f7d;
  --radius:16px; --radius-sm:11px;
  --shadow:0 18px 50px #00000066;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;color:var(--ink);
  font:15px/1.7 -apple-system,system-ui,"Segoe UI","Noto Sans SC","Microsoft YaHei",sans-serif;
  background:
    radial-gradient(900px 600px at 82% -8%, var(--bg-glow1) 0%, transparent 60%),
    radial-gradient(700px 520px at 8% 12%, var(--bg-glow2) 0%, transparent 55%),
    var(--bg);
  background-attachment:fixed;
}
a{color:inherit;text-decoration:none;cursor:pointer}
button{font:inherit;cursor:pointer}
code{background:#ffffff10;border-radius:5px;padding:1px 6px;font-size:12.5px;color:var(--cyan)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#2a2a44;border-radius:8px;border:2px solid transparent;background-clip:content-box}
::-webkit-scrollbar-thumb:hover{background:#3a3a5c;background-clip:content-box}

/* ---------- top bar ---------- */
.topbar{
  position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:6px;
  padding:0 22px;height:58px;
  background:#0a0a14cc;backdrop-filter:blur(14px);border-bottom:1px solid var(--line-soft);
}
.brand{display:flex;align-items:baseline;gap:9px;margin-right:18px;user-select:none;cursor:pointer}
.brand .logo{font-size:19px;font-weight:800;letter-spacing:.5px;
  background:linear-gradient(92deg,var(--violet),var(--cyan));-webkit-background-clip:text;background-clip:text;color:transparent}
.brand .en{font-size:10px;letter-spacing:3px;color:var(--faint);text-transform:uppercase}
.nav{display:flex;gap:2px}
.nav a{display:flex;align-items:center;gap:6px;padding:7px 11px;border-radius:10px;color:var(--dim);font-size:14px;transition:.15s;white-space:nowrap}
.nav a:hover{background:#ffffff0a;color:var(--ink)}
.nav a.on{color:var(--ink);background:linear-gradient(180deg,#ffffff12,#ffffff06);box-shadow:inset 0 0 0 1px var(--line)}
.spacer{flex:1}
.iconbtn{width:34px;height:34px;display:grid;place-items:center;border-radius:9px;color:var(--dim);background:transparent;border:none;transition:.15s}
.iconbtn:hover{background:#ffffff0d;color:var(--ink)}
.llmpill{margin-left:6px;display:flex;align-items:center;gap:7px;padding:6px 13px;border-radius:20px;border:1px solid var(--line);color:var(--dim);font-size:12.5px}
.llmpill.ok{color:var(--good);border-color:#1c4a3a}
.llmpill.no{color:var(--gold);border-color:#5a4a1a}

#app{min-height:calc(100vh - 58px)}
.wrap{max-width:1280px;margin:0 auto;padding:30px 26px 90px}
.banner{max-width:1280px;margin:0 auto;padding:10px 26px;display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--faint);
  background:#a98bff0d;border-bottom:1px solid var(--line-soft)}
.banner b{color:var(--violet)}
.banner a{color:var(--cyan)}
.empty{color:var(--faint);text-align:center;padding:50px}
.loading{color:var(--faint);text-align:center;padding:60px;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}
.lead{color:var(--dim);line-height:1.8}
.crumb{font-size:12.5px;color:var(--faint);margin-bottom:6px}
.crumb a{color:var(--dim)}.crumb a:hover{color:var(--ink)}
.note{color:var(--faint);font-size:12.5px;margin-top:6px;line-height:1.6}
.err{color:var(--bad);font-size:13px;min-height:18px;margin:6px 0}
.kv{width:100%;border-collapse:collapse}
.kv td{padding:7px 0;border-bottom:1px solid var(--line-soft);font-size:13.5px;vertical-align:top}
.kv td:first-child{color:var(--faint);width:90px}

/* ---------- buttons / chips ---------- */
.btn{display:inline-flex;align-items:center;gap:7px;border:none;border-radius:10px;padding:9px 16px;font-size:14px;font-weight:600;color:#fff;
  background:linear-gradient(180deg,var(--violet),var(--violet-d));box-shadow:0 6px 18px #7a5cf044;transition:.15s}
.btn:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn:disabled{opacity:.5;pointer-events:none}
.btn.ghost{background:transparent;color:var(--dim);border:1px solid var(--line);box-shadow:none;font-weight:500}
.btn.ghost:hover{border-color:var(--violet);color:var(--ink)}
.btn.sm{padding:6px 12px;font-size:13px}
.btn.ai{background:linear-gradient(92deg,#6a4ad0,#2f9e9e)}
.searchbar{flex:1;display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:9px 14px;color:var(--faint)}
.searchbar input{flex:1;background:transparent;border:none;outline:none;color:var(--ink);font:inherit}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0 22px}
.fchip{padding:6px 14px;border-radius:20px;font-size:13px;color:var(--dim);background:var(--surface);border:1px solid var(--line);transition:.15s}
.fchip:hover{color:var(--ink);border-color:#3a3a5c}
.fchip.on{color:#fff;background:linear-gradient(180deg,var(--violet),var(--violet-d));border-color:transparent}

/* ---------- works gallery ---------- */
.page-head{display:flex;align-items:center;gap:14px;margin-bottom:8px;flex-wrap:wrap}
.page-head h1{font-size:24px;margin:0;letter-spacing:.5px}
.page-head .sub{color:var(--faint);font-size:13px}
.toolrow{display:flex;align-items:center;gap:10px;margin:18px 0 4px;flex-wrap:wrap}
.works{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.work{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:.18s;position:relative}
.work:hover{transform:translateY(-4px);border-color:#3b3b62;box-shadow:var(--shadow)}
.cover{height:168px;position:relative;overflow:hidden;background-size:cover;background-position:center}
.cover .sigil{position:absolute;right:14px;bottom:12px;font-size:30px;filter:drop-shadow(0 2px 6px #0008)}
.cover .vig{position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,#0b0b13 100%)}
.work .body{padding:14px 16px 16px}
.work h3{margin:0 0 5px;font-size:17px;display:flex;align-items:center;gap:8px}
.work .desc{color:var(--dim);font-size:13px;line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:42px}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.tag{font-size:11px;padding:2px 9px;border-radius:20px;color:var(--dim);background:#ffffff08;border:1px solid var(--line)}
.tag.v{color:var(--violet);border-color:#3a2a6a}.tag.c{color:var(--cyan);border-color:#1c4a45}.tag.g{color:var(--gold);border-color:#5a4a1a}
.tag.forge{color:var(--cyan);border-color:#1c4a45}
.work .foot{display:flex;align-items:center;justify-content:space-between;margin-top:12px;color:var(--faint);font-size:12px}
.work .menu{position:absolute;top:10px;right:10px;width:28px;height:28px;border-radius:8px;background:#0009;color:#fff;display:grid;place-items:center;opacity:0;transition:.15s}
.work:hover .menu{opacity:1}
.newcard{border:1px dashed var(--line);background:#ffffff04;display:grid;place-items:center;min-height:280px;color:var(--faint);text-align:center}
.newcard:hover{border-color:var(--violet);color:var(--ink)}

/* covers (gradient art placeholders) */
.cv-night{background:
  repeating-linear-gradient(115deg,#ffffff07 0 1px,transparent 1px 9px),
  radial-gradient(120px 90px at 72% 60%, #ffb86322 0%, transparent 70%),
  radial-gradient(60px 40px at 70% 56%, #ffcf8a55 0%, transparent 75%),
  linear-gradient(180deg,#0e1430 0%,#161a3a 50%,#0b0d22 100%)}
.cv-wuxia{background:
  radial-gradient(200px 120px at 30% 20%, #ffffff14 0%, transparent 60%),
  linear-gradient(180deg,#1b2230 0%,#2a3340 40%,#10151c 100%)}
.cv-cyber{background:
  repeating-linear-gradient(90deg,#ff4d9d10 0 2px,transparent 2px 14px),
  radial-gradient(140px 100px at 60% 70%, #2fd6ff33 0%, transparent 70%),
  linear-gradient(180deg,#170a26 0%,#241038 45%,#0a0716 100%)}
.cv-heal{background:
  radial-gradient(180px 120px at 70% 30%, #8be0c422 0%, transparent 65%),
  linear-gradient(180deg,#16302e 0%,#244a3f 45%,#0e201c 100%)}

/* ---------- chat / RP ---------- */
.chatgrid{display:grid;grid-template-columns:248px 1fr 296px;gap:0;height:calc(100vh - 58px)}
.convlist{border-right:1px solid var(--line-soft);padding:16px 12px;overflow:auto;background:#0b0b1366}
.convlist .newconv{width:100%;justify-content:center;margin-bottom:12px}
.convsearch{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:7px 11px;color:var(--faint);font-size:13px;margin-bottom:12px}
.convsearch input{flex:1;background:transparent;border:none;outline:none;color:var(--ink);font:inherit;font-size:13px}
.convgrp{font-size:11px;color:var(--faint);letter-spacing:1px;margin:14px 6px 6px}
.conv{display:flex;gap:10px;padding:9px 10px;border-radius:11px;margin-bottom:3px;transition:.12s;cursor:pointer}
.conv:hover{background:#ffffff0a}
.conv.on{background:linear-gradient(180deg,#ffffff12,#ffffff05);box-shadow:inset 0 0 0 1px var(--line)}
.conv .av{width:34px;height:34px;border-radius:9px;flex:0 0 auto;background-size:cover;background-position:center}
.conv .t{min-width:0}
.conv .t .nm{font-size:13.5px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv .t .pv{font-size:12px;color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.chatmain{display:flex;flex-direction:column;min-width:0;background:radial-gradient(700px 400px at 50% -20%,#15102e 0%,transparent 60%)}
.chathead{display:flex;align-items:center;gap:12px;padding:13px 22px;border-bottom:1px solid var(--line-soft);background:#0a0a1499}
.chathead .av{width:38px;height:38px;border-radius:10px;background-size:cover;background-position:center;flex:0 0 auto}
.chathead .nm{font-size:15px;font-weight:600}
.chathead .meta{font-size:12px;color:var(--faint)}
.ch-acts{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
.scroll{flex:1;overflow:auto;padding:26px 0}
.thread{max-width:760px;margin:0 auto;padding:0 22px}

.opening{background:linear-gradient(180deg,#14142480,#0e0e1a80);border:1px solid var(--line);border-radius:18px;padding:30px 30px 24px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.opening::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--violet),var(--cyan))}
.opening .lead{color:var(--dim);line-height:2;font-size:15px}
.opening .lead b{color:var(--ink)}
.opening .gswipe{display:flex;align-items:center;gap:10px;justify-content:flex-end;color:var(--faint);font-size:12px;margin-top:14px}
.opening .gswipe a{cursor:pointer;color:var(--dim)}.opening .gswipe a:hover{color:var(--ink)}

.brow{display:flex;gap:11px;margin:18px 0;align-items:flex-end}
.brow.user{flex-direction:row-reverse}
.cavatar,.brow .cav{width:34px;height:34px;border-radius:9px;flex:0 0 auto;background-size:cover;background-position:center;object-fit:cover}
.bubble{padding:12px 16px;border-radius:15px;max-width:80%;line-height:1.85;white-space:pre-wrap;word-break:break-word}
.bubble.char{background:var(--surface2);border:1px solid var(--line);border-bottom-left-radius:5px}
.bubble.char em{color:var(--dim);font-style:normal;opacity:.85}
.bubble.user{background:linear-gradient(180deg,var(--violet),var(--violet-d));color:#fff;border-bottom-right-radius:5px}
.bubble.typing{color:var(--faint)}
.bcol{display:flex;flex-direction:column;max-width:80%}
.bcol .bubble{max-width:none}
.mtools{display:none;gap:13px;font-size:11.5px;color:var(--faint);margin:5px 0 0 2px}
.brow.msg:hover .mtools{display:flex}
.mtools a{cursor:pointer}.mtools a:hover{color:var(--ink)}
.trace{display:none;margin:8px 0 0 2px;background:#0d0d18;border:1px solid var(--line);border-radius:11px;padding:11px 13px;font-size:12px;color:var(--dim);max-width:520px}
.trace.on{display:block;animation:fade .2s}
.trace .tt{color:var(--faint);font-size:11px;letter-spacing:.5px;margin-bottom:9px}
.trace .tr{display:flex;gap:8px;margin-bottom:7px;line-height:1.5}
.trace .tk{color:var(--faint);flex:0 0 76px}
.tag2{display:inline-block;font-size:11px;padding:1px 8px;border-radius:20px;border:1px solid #3a2a6a;color:var(--violet);background:#a98bff14;margin:0 4px 4px 0}
.swipe{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--faint);margin:3px 0 0 45px}
.swipe a{cursor:pointer;color:var(--dim)}.swipe a:hover{color:var(--ink)}
.swipe .sp{flex:1}
.hud{background:#0d0d18;border:1px solid var(--line);border-radius:13px;padding:12px 15px;max-width:80%}
iframe.hud{padding:0}

.composer{padding:14px 22px 20px;border-top:1px solid var(--line-soft);background:#0a0a14cc}
.composer .box{max-width:760px;margin:0 auto;display:flex;gap:10px;align-items:flex-end}
.composer textarea{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:12px 15px;color:var(--ink);font:inherit;resize:none;height:46px;max-height:160px;outline:none}
.composer textarea:focus{border-color:var(--violet)}
.sendbtn{width:46px;height:46px;border-radius:13px;border:none;display:grid;place-items:center;color:#fff;background:linear-gradient(180deg,var(--violet),var(--violet-d));flex:0 0 auto}
.oocbar{max-width:760px;margin:0 auto;display:flex;align-items:center;gap:10px;padding:0 0 8px}
.ooc-toggle{font-size:12.5px;padding:5px 13px;border-radius:16px;border:1px solid var(--line);color:var(--dim);background:var(--surface);cursor:pointer;transition:.13s;white-space:nowrap}
.ooc-toggle:hover{border-color:var(--gold);color:var(--ink)}
.ooc-toggle.on{color:var(--gold);border-color:#5a4a1a;background:#ffce8614}
.ooc-hint{font-size:11.5px;color:var(--faint)}
.composer.director textarea{border-color:var(--gold)}
.composer.director .sendbtn{background:linear-gradient(180deg,var(--gold),#d9a93f)}
.qrbar{max-width:760px;margin:0 auto;display:flex;gap:7px;flex-wrap:wrap;padding:0 0 9px}
.qr{font-size:12.5px;padding:5px 12px;border-radius:16px;border:1px solid var(--line);color:var(--dim);background:var(--surface);cursor:pointer;transition:.13s}
.qr:hover{border-color:var(--violet);color:var(--ink)}
.qr.edit{border-style:dashed;color:var(--faint)}

/* right panel */
.rpanel{border-left:1px solid var(--line-soft);background:#0b0b1366;display:flex;flex-direction:column;min-width:0}
.ptabs{display:flex;padding:10px 12px 0;gap:4px;border-bottom:1px solid var(--line-soft)}
.ptab{flex:1;text-align:center;padding:9px 0;font-size:13px;color:var(--faint);border-bottom:2px solid transparent;transition:.15s;cursor:pointer}
.ptab:hover{color:var(--dim)}
.ptab.on{color:var(--ink);border-bottom-color:var(--violet)}
.pbody{flex:1;overflow:auto;padding:16px 14px}
.ptab-pane{display:none}.ptab-pane.on{display:block}
.cardinfo .cov{height:120px;border-radius:12px;margin-bottom:12px;background-size:cover;background-position:center}
.cardinfo h3{margin:0 0 4px;font-size:16px}
.cardinfo .by{color:var(--faint);font-size:12px;margin-bottom:10px}
.cardinfo p{color:var(--dim);font-size:13px;line-height:1.7}
.sw-grp{font-size:11px;letter-spacing:1px;color:var(--faint);margin:16px 2px 8px}
.sw-grp:first-child{margin-top:0}
.sw{display:flex;align-items:center;justify-content:space-between;padding:8px 4px;border-bottom:1px solid var(--line-soft)}
.sw .l{font-size:13.5px;color:var(--dim)}
.sw .l small{display:block;color:var(--faint);font-size:11px;margin-top:1px}
.toggle{width:38px;height:22px;border-radius:20px;background:#33334e;position:relative;transition:.18s;flex:0 0 auto;cursor:pointer}
.toggle::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#cfcfe6;transition:.18s}
.toggle.on{background:linear-gradient(90deg,var(--violet),var(--violet-d))}
.toggle.on::after{left:18px;background:#fff}
.slider-row{margin:14px 2px}
.slider-row .lab{display:flex;justify-content:space-between;font-size:13px;color:var(--dim);margin-bottom:6px}
.slider-row .lab b{color:var(--cyan)}
.track{height:6px;border-radius:6px;background:#2a2a44;position:relative}
.track .fill{position:absolute;left:0;top:0;bottom:0;border-radius:6px;background:linear-gradient(90deg,var(--violet),var(--cyan))}
.track .knob{position:absolute;top:50%;width:14px;height:14px;border-radius:50%;background:#fff;transform:translate(-50%,-50%);box-shadow:0 1px 4px #0006}
.var{margin:12px 2px}
.var .vh{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px}
.var .vh .vn{color:var(--dim)}.var .vh .vv{color:var(--cyan);font-weight:600}
.var .vh .vctl a{color:var(--faint);margin-left:7px;font-size:11px}
.var .vh .vctl a:hover{color:var(--ink)}
.vtrack{height:8px;border-radius:6px;background:#2a2a44;overflow:hidden}
.vtrack .vf{height:100%;border-radius:6px}
.drives{background:#0d0d18;border:1px solid var(--line);border-radius:12px;padding:12px 13px;margin-bottom:14px}
.drives .dh{font-size:11px;color:var(--faint);letter-spacing:.5px;margin-bottom:10px}
.drive{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.drive:last-child{margin-bottom:0}
.drive .di{padding:2px 8px;border-radius:20px;background:#a98bff18;color:var(--violet);font-size:11px;flex:0 0 auto}
.drive .dt{flex:1;font-size:13px;color:var(--dim)}
.pchar{border:1px solid var(--line);border-radius:12px;background:#ffffff05;padding:11px 12px;margin-bottom:10px}
.pchar .hd{display:flex;gap:10px;align-items:center}
.pchar .hd .av{width:40px;height:40px;border-radius:10px;flex:0 0 auto;background-size:cover;background-position:center}
.pchar .hd .t{flex:1;min-width:0}
.pchar .hd .nm{font-size:13.5px;color:var(--ink)}
.pchar .hd .rl{font-size:11px;color:var(--faint);margin-top:1px}
.pchar .ops{display:flex;gap:6px;margin-top:10px}
.pchar .op{flex:1;text-align:center;font-size:11.5px;color:var(--dim);border:1px solid var(--line);border-radius:8px;padding:5px 0;cursor:pointer;transition:.13s}
.pchar .op:hover{border-color:var(--violet);color:var(--ink)}

/* ---------- companion ---------- */
.comp{display:grid;grid-template-columns:300px 1fr;gap:22px;align-items:start}
.her{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;position:sticky;top:78px}
.her .portrait{height:340px;position:relative;background-size:cover;background-position:center}
.her .portrait .vig{position:absolute;inset:0;background:linear-gradient(180deg,transparent 45%,#0b0b13f2 100%)}
.her .portrait .name{position:absolute;left:16px;bottom:14px}
.her .portrait .name b{display:block;font-size:21px}
.her .portrait .name span{font-size:12px;color:var(--dim)}
.her .stat{padding:14px 16px}
.her .stat .line{display:flex;align-items:center;gap:9px;color:var(--dim);font-size:13px;margin-bottom:7px}
.her .stat .line i{color:var(--cyan);font-style:normal;width:14px;text-align:center}
.compmain>section{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;margin-bottom:18px}
.compmain h2{font-size:14px;margin:0 0 14px;color:var(--ink);display:flex;align-items:center;gap:10px}
.compmain h2 small{color:var(--faint);font-weight:400;font-size:12px}
.rel{display:grid;grid-template-columns:1fr 1fr;gap:14px 28px}
.relrow .rt{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px}
.relrow .rt .rn{color:var(--dim)}.relrow .rt .rv{color:var(--cyan);font-weight:600}
.reltrack{height:7px;border-radius:6px;background:#2a2a44;overflow:hidden}
.reltrack .rf{height:100%;border-radius:6px}
.stage{display:inline-flex;align-items:center;gap:8px;background:#a98bff18;border:1px solid #3a2a6a;color:var(--violet);border-radius:20px;padding:5px 14px;font-size:13px}
.kwrow{display:flex;gap:6px;flex-wrap:wrap}
.kw{font-size:12px;padding:3px 10px;border-radius:20px;background:#a98bff18;border:1px solid #3a2a6a;color:var(--violet)}
.mem{border-left:2px solid var(--gold);padding:6px 16px;color:var(--dim);font-style:italic;line-height:1.9;background:#ffce8608}
.proactive{display:flex;gap:11px;align-items:flex-start;background:#0d0d18;border:1px solid var(--line);border-radius:12px;padding:13px 15px}
.proactive .av{width:36px;height:36px;border-radius:9px;flex:0 0 auto;background-size:cover;background-position:center}
.proactive .txt{font-size:14px;line-height:1.8}
.miles{position:relative;border-left:2px solid var(--line);margin-left:6px;padding-left:18px}
.mile{position:relative;margin-bottom:14px}
.mile:last-child{margin-bottom:0}
.mile::before{content:"";position:absolute;left:-25px;top:6px;width:9px;height:9px;border-radius:50%;background:var(--violet)}
.mile.star::before{background:var(--gold)}
.mile .mt{font-size:11px;color:var(--faint)}
.mile .md{font-size:13.5px;color:var(--dim);margin-top:2px;line-height:1.7}

/* ---------- novel ---------- */
.novel{display:grid;grid-template-columns:230px 1fr 252px;height:calc(100vh - 58px)}
.nv-side{border-right:1px solid var(--line-soft);padding:16px 12px;overflow:auto;background:#0b0b1366}
.nv-side .grp{font-size:11px;color:var(--faint);letter-spacing:1px;margin:6px 6px 8px}
.nv-ch{padding:9px 11px;border-radius:9px;font-size:13.5px;color:var(--dim);transition:.12s;display:flex;justify-content:space-between;gap:8px;cursor:pointer}
.nv-ch:hover{background:#ffffff0a;color:var(--ink)}
.nv-ch.on{background:linear-gradient(180deg,#ffffff12,#ffffff05);color:var(--ink);box-shadow:inset 0 0 0 1px var(--line)}
.nv-ch .w{color:var(--faint);font-size:11px;flex:0 0 auto}
.nv-read{overflow:auto;background:radial-gradient(700px 360px at 50% -20%,#15102e 0%,transparent 60%)}
.reader2{max-width:660px;margin:0 auto;padding:42px 30px 70px}
.reader2 .ch-t{font-size:12px;color:var(--faint);letter-spacing:6px;text-align:center;margin-bottom:8px}
.reader2 h2{font-size:25px;text-align:center;margin:0 0 32px;font-weight:600;letter-spacing:1px}
.reader2 .prose{font-family:Georgia,"Songti SC","Noto Serif SC",serif;font-size:17px;line-height:2.2;color:#dadaec}
.reader2 .prose p{margin:0 0 18px;text-indent:2em}
.contbar{max-width:660px;margin:26px auto 0;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;border-top:1px solid var(--line-soft);padding-top:24px}
.nv-meta{border-left:1px solid var(--line-soft);padding:18px 16px;overflow:auto;background:#0b0b1366}
.nv-meta h3{font-size:12px;color:var(--faint);letter-spacing:1px;margin:18px 0 10px}
.nv-meta h3:first-child{margin-top:0}
.metarow{display:flex;justify-content:space-between;font-size:13px;color:var(--dim);padding:6px 0;border-bottom:1px solid var(--line-soft);gap:10px}
.metarow b{color:var(--ink);font-weight:600}
.hook{font-size:12.5px;color:var(--dim);padding:8px 0;border-bottom:1px solid var(--line-soft);display:flex;gap:9px;align-items:flex-start;line-height:1.5}
.hdot{width:7px;height:7px;border-radius:50%;flex:0 0 auto;margin-top:5px}
.hdot.open{background:var(--gold)}.hdot.done{background:var(--good)}.hdot.alpha{background:var(--rose)}
.pipe{display:flex;gap:6px;flex-wrap:wrap}
.pipe .step{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--line);color:var(--faint);cursor:pointer}
.pipe .step.done{color:var(--good);border-color:#1c4a3a}
.pipe .step.now{color:var(--violet);border-color:#3a2a6a}

/* ---------- characters ---------- */
.chars{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:18px}
.charcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px 18px;text-align:center;cursor:pointer;transition:.18s;position:relative}
.charcard:hover{transform:translateY(-4px);border-color:#3b3b62;box-shadow:var(--shadow)}
.charcard .av{width:88px;height:88px;border-radius:50%;margin:0 auto 12px;border:2px solid var(--line);background-size:cover;background-position:center}
.charcard h3{margin:0 0 3px;font-size:16px}
.charcard .role{font-size:12px;color:var(--faint);margin-bottom:9px}
.charcard .from{font-size:12px;color:var(--dim)}
.charcard .xw{position:absolute;top:12px;right:12px;font-size:10px;color:var(--violet);background:#a98bff18;border:1px solid #3a2a6a;border-radius:20px;padding:2px 9px}
.charcard .incar{font-size:11px;color:var(--violet);margin-top:7px}
.charcard.newcard{display:grid;place-items:center;min-height:220px}

/* ---------- worldbook ---------- */
.wb{display:grid;grid-template-columns:260px 1fr;gap:18px;align-items:start}
.wb .list{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:8px;max-height:70vh;overflow:auto}
.wb .entry{padding:10px 12px;border-radius:10px;font-size:14px;color:var(--dim);transition:.12s;display:flex;justify-content:space-between;align-items:center;cursor:pointer;gap:8px}
.wb .entry:hover{background:#ffffff08;color:var(--ink)}
.wb .entry.on{background:linear-gradient(180deg,#ffffff12,#ffffff05);color:var(--ink);box-shadow:inset 0 0 0 1px var(--line)}
.wb .entry .badge{font-size:10px;padding:1px 7px;border-radius:20px;background:#a98bff22;color:var(--violet);flex:0 0 auto}
.wb .editor{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:22px 24px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;color:var(--faint);margin-bottom:6px;letter-spacing:.5px}
.field input,.field textarea,.field select{width:100%;background:#0d0d18;border:1px solid var(--line);border-radius:10px;padding:10px 13px;color:var(--ink);font:inherit;outline:none}
.field textarea{resize:vertical;line-height:1.8}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--violet)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.swline{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line-soft);font-size:13.5px;color:var(--dim)}

/* ---------- presets ---------- */
.preset-head{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
.modlist{display:flex;flex-direction:column;gap:10px;max-width:760px}
.mod{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px 16px;transition:.15s}
.mod:hover{border-color:#3a3a5c}
.mod .info{flex:1}
.mod .info .h{font-size:14.5px;display:flex;align-items:center;gap:8px}
.mod .info .d{font-size:12.5px;color:var(--faint);margin-top:2px}
.pill{font-size:10px;padding:1px 8px;border-radius:20px;border:1px solid var(--line)}
.pill.sys{color:var(--cyan);border-color:#1c4a45}.pill.style{color:var(--gold);border-color:#5a4a1a}.pill.guard{color:var(--rose);border-color:#5a2336}

/* ---------- assets ---------- */
.assetsec{margin-bottom:26px}
.assetsec h2{font-size:13px;color:var(--faint);letter-spacing:1px;border-bottom:1px solid var(--line-soft);padding-bottom:8px;margin:0 0 14px;display:flex;justify-content:space-between;align-items:center}
.assetgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(178px,1fr));gap:14px}
.asset{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px;cursor:pointer;transition:.15s}
.asset:hover{border-color:var(--violet);transform:translateY(-3px)}
.asset h4{margin:0 0 5px;font-size:14px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.asset .d{font-size:12px;color:var(--faint);line-height:1.55}
.asset .ty{font-size:10px;color:var(--violet);background:#a98bff18;border:1px solid #3a2a6a;border-radius:20px;padding:1px 8px;font-weight:400}

/* ---------- settings ---------- */
.set-tabs{display:inline-flex;gap:4px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:5px;margin-bottom:24px;flex-wrap:wrap}
.set-tab{padding:8px 16px;border-radius:9px;font-size:13.5px;color:var(--dim);transition:.15s;cursor:pointer}
.set-tab:hover{color:var(--ink)}
.set-tab.on{color:#fff;background:linear-gradient(180deg,var(--violet),var(--violet-d))}
.set-pane{display:none;max-width:680px}.set-pane.on{display:block}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.packet{background:#0d0d18;border:1px solid var(--line);border-radius:10px;padding:12px 14px;font-size:13px;white-space:pre-wrap;color:var(--dim);margin-top:10px}
.section{margin:22px 0}
.section h2{font-size:15px;margin:0 0 12px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;transition:.15s}
.card.click{cursor:pointer}.card.click:hover{transform:translateY(-3px);border-color:#3b3b62;box-shadow:var(--shadow)}
.card h3{margin:0 0 6px;font-size:15px}
.card .meta{color:var(--faint);font-size:12.5px}
.timeline .ev{border-left:2px solid var(--line);padding:4px 0 12px 16px;margin-left:6px;position:relative;font-size:13.5px;color:var(--dim)}
.timeline .ev::before{content:"";position:absolute;left:-5px;top:9px;width:8px;height:8px;border-radius:50%;background:var(--violet)}
.timeline .ev .w{font-size:12px;color:var(--faint);margin-bottom:3px}

/* ---------- mascot ---------- */
.kanban{position:fixed;right:24px;bottom:22px;z-index:80;display:flex;flex-direction:column;align-items:flex-end}
@keyframes kpulse{0%,100%{box-shadow:0 0 0 0 #62e6a466}50%{box-shadow:0 0 0 6px #62e6a400}}
.kb-mini{width:54px;height:54px;border-radius:50%;border:2px solid var(--violet);cursor:pointer;position:relative;overflow:hidden;
  background:radial-gradient(50px 42px at 58% 30%,#ffcf8a55,transparent 70%),linear-gradient(160deg,#2a1c52,#13132a);
  box-shadow:0 8px 24px #7a5cf055,0 0 0 5px #a98bff12;transition:.18s}
.kb-mini:hover{transform:scale(1.08)}
.kb-mini svg{position:absolute;left:50%;bottom:-2px;transform:translateX(-50%);height:52px;width:auto}
.kb-mini .dot{position:absolute;top:3px;right:5px;width:10px;height:10px;border-radius:50%;background:var(--good);border:2px solid #0b0b13;animation:kpulse 2.2s infinite;z-index:2}
.kb-stage{display:none;align-items:flex-end;gap:12px}
.kb-stage.on{display:flex;animation:fade .25s}
.kb-opts{display:flex;flex-direction:column;align-items:flex-end;gap:9px;margin-bottom:26px}
.kb-say{max-width:230px;background:var(--surface2);border:1px solid var(--line);border-radius:14px;border-bottom-right-radius:4px;padding:10px 13px;font-size:12.5px;color:var(--dim);line-height:1.65;box-shadow:var(--shadow);margin-bottom:3px}
.kb-say b{color:var(--ink)}
.kb-opt{display:inline-flex;align-items:center;gap:8px;background:#15131fe6;backdrop-filter:blur(6px);border:1px solid var(--line);border-radius:22px;padding:9px 16px;font-size:13px;color:var(--dim);cursor:pointer;box-shadow:var(--shadow);transition:.14s;white-space:nowrap}
.kb-opt:hover{border-color:var(--violet);color:var(--ink);transform:translateX(-4px)}
.kb-figure{position:relative;filter:drop-shadow(0 10px 16px #000a) drop-shadow(0 0 26px #7a5cf040)}
.kb-figure svg{height:330px;width:auto;display:block}
.kb-figure .kb-close{position:absolute;top:2px;right:2px;width:24px;height:24px;border-radius:50%;border:none;background:#0009;color:#fff;font-size:12px;cursor:pointer;z-index:3}
.kb-figure .kb-close:hover{background:#000d}
.kb-console{font-size:11px;color:var(--faint);background:#0d0d18cc;border:1px solid var(--line);border-radius:12px;padding:7px 11px;backdrop-filter:blur(6px);box-shadow:var(--shadow);white-space:nowrap}

/* ---------- nexus / chron ---------- */
.viewsw{margin-left:auto;display:inline-flex;gap:3px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:4px}
.vbtn{padding:6px 13px;border-radius:8px;font-size:13px;color:var(--dim);cursor:pointer;transition:.13s}
.vbtn:hover{color:var(--ink)}
.vbtn.on{color:#fff;background:linear-gradient(180deg,var(--violet),var(--violet-d))}
.modebar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px 16px;margin-bottom:18px}
.modebar .ml{font-size:13px;color:var(--faint)}
.mchip{font-size:12.5px;padding:5px 12px;border-radius:20px;border:1px solid var(--line);color:var(--dim);background:#ffffff05;cursor:pointer;transition:.13s}
.mchip:hover{border-color:var(--violet);color:var(--ink)}
.mchip.core{color:var(--violet);border-color:#3a2a6a;background:#a98bff14}
.nexusmap{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:10px}
.nexusmap svg{width:100%;height:auto;display:block}
.nx-edge{stroke:#5a4a9a;stroke-width:1.5;stroke-dasharray:5 5;opacity:.7}
.nx-elabel{fill:var(--cyan);font-size:12px;text-anchor:middle}
.nx-node circle{stroke-width:2;cursor:pointer;transition:.15s}
.nx-node:hover circle{filter:brightness(1.25)}
.nx-name{fill:var(--ink);font-size:13px;text-anchor:middle;cursor:pointer}
.chron{border-left:2px solid var(--line);margin-left:8px;padding-left:20px}
.cev{position:relative;margin-bottom:16px}
.cev::before{content:"";position:absolute;left:-27px;top:5px;width:10px;height:10px;border-radius:50%;background:var(--violet);border:2px solid var(--bg)}
.cev.star::before{background:var(--gold)}
.cev.xw::before{background:var(--cyan)}
.cev .w{font-size:11px;color:var(--faint)}
.cev .h{font-size:14.5px;color:var(--ink);margin-top:2px}
.cev .h .star{color:var(--gold);font-size:12px;margin-left:6px}
.cev .d{font-size:12.5px;color:var(--dim);margin-top:3px;line-height:1.6}

/* ---------- modal / toast ---------- */
.overlay{position:fixed;inset:0;z-index:90;background:#05050acc;backdrop-filter:blur(3px);display:grid;place-items:center;padding:24px;animation:fade .18s}
.modal{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:24px 26px;max-width:560px;width:100%;box-shadow:var(--shadow);max-height:88vh;overflow:auto}
.modal h3{margin:0 0 16px;font-size:18px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
.toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%);z-index:200;background:var(--surface2);border:1px solid var(--line);border-left:3px solid var(--violet);border-radius:12px;padding:11px 18px;font-size:13.5px;color:var(--ink);box-shadow:var(--shadow);animation:fade .2s;max-width:80vw}
.toast.bad{border-left-color:var(--bad)}

/* farewell */
.farewell{display:none;position:fixed;inset:0;z-index:100;background:radial-gradient(820px 620px at 50% 28%,#1a1338 0%,#06060c 72%);align-items:center;justify-content:center;padding:30px;animation:fade .3s}
.farewell.on{display:flex}
.fw-card{max-width:460px;text-align:center}
.fw-portrait{width:118px;height:118px;border-radius:50%;margin:0 auto 22px;border:2px solid var(--violet);box-shadow:0 0 50px #7a5cf055;background-size:cover;background-position:center}
.fw-k{font-size:12px;letter-spacing:4px;color:var(--gold);margin-bottom:14px}
.fw-card h2{font-size:22px;margin:0 0 20px;font-weight:600}
.fw-say{font-size:16px;color:var(--ink);line-height:2.1;font-style:italic;margin-bottom:14px;white-space:pre-line}
.fw-note{font-size:13px;color:var(--dim);line-height:1.85;margin-bottom:28px}
.fw-acts{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}

@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* responsive */
@media(max-width:1024px){
  .nav a span.lbl{display:none}
  .chatgrid{grid-template-columns:1fr;height:auto}
  .convlist,.rpanel{display:none}
  .novel{grid-template-columns:1fr;height:auto}
  .nv-side,.nv-meta{display:none}
  .comp{grid-template-columns:1fr}
  .her{position:static}
  .wb{grid-template-columns:1fr}
  .row2,.grid2{grid-template-columns:1fr}
}
</style>

<script>
/* ===================== helpers ===================== */
const esc=(s)=>(s==null?'':(''+s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
/* jsq：把值安全嵌进“双引号属性里的单引号 JS 字符串”——先做 JS 转义(\ ' 换行)，再交给 esc 做属性转义 */
const jsq=(s)=>esc(String(s==null?'':s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\r/g,'').replace(/\n/g,'\\n'));
async function api(p){const r=await fetch('/api'+p);if(!r.ok)throw new Error((await r.json().catch(()=>({}))).error||r.status);return r.json()}
async function post(p,b){const r=await fetch('/api'+p,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});
  const j=await r.json();if(!r.ok||j.ok===false)throw new Error(j.error||r.status);return j}
function toast(msg,bad){const t=document.createElement('div');t.className='toast'+(bad?' bad':'');t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),4200)}
function md(t){const lines=(t||'').split('\n');let h='',ul=false;const cu=()=>{if(ul){h+='</ul>';ul=false}};
  for(let ln of lines){
    if(/^###\s/.test(ln)){cu();h+='<h3>'+esc(ln.slice(4))+'</h3>'}
    else if(/^##\s/.test(ln)){cu();h+='<h2>'+esc(ln.slice(3))+'</h2>'}
    else if(/^#\s/.test(ln)){cu();h+='<h1>'+esc(ln.slice(2))+'</h1>'}
    else if(/^>\s?/.test(ln)){cu();h+='<blockquote>'+inl(ln.replace(/^>\s?/,''))+'</blockquote>'}
    else if(/^[-*]\s/.test(ln)){if(!ul){h+='<ul>';ul=true}h+='<li>'+inl(ln.slice(2))+'</li>'}
    else if(ln.trim()===''){cu()}
    else{cu();h+='<p>'+inl(ln)+'</p>'}}
  cu();return h}
function inl(s){return esc(s).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/`(.+?)`/g,'<code>$1</code>')}
const el=(id)=>document.getElementById(id);
const app=()=>el('app');
function loading(){app().innerHTML='<div class="loading">载入中…</div>';}

/* genre → cover + sigil */
function coverClass(g){g=g||'';
  if(/赛博|cyber|科幻|霓虹|未来|机甲|星际/.test(g))return'cv-cyber';
  if(/武侠|仙侠|江湖|玄幻|修真|古风|黑道|无限/.test(g))return'cv-wuxia';
  if(/治愈|日常|校园|青春|日式|恋爱|甜/.test(g))return'cv-heal';
  return'cv-night';}
function sigil(g){g=g||'';
  if(/赛博|cyber|科幻|霓虹|机甲|星际/.test(g))return'🌧️';
  if(/武侠|仙侠|江湖|玄幻|修真|无限/.test(g))return'⚔️';
  if(/都市|黑道/.test(g))return'🌃';
  if(/治愈|日常|校园|青春|日式/.test(g))return'⛩️';
  return'🌌';}
function avBg(rel,genre){return rel?`background-image:url('/img/${esc(rel)}')`:'';}

/* 关系攻略轴(镜像 sv/attrs.REL_AXES,纯展示元) */
const REL_AXES=[
  {key:'好感',color:'#ff8fb0',min:-100,max:100},
  {key:'心动',color:'#ff6b9c',min:0,max:100},
  {key:'信任',color:'#5ee0d0',min:-100,max:100},
  {key:'依赖',color:'#9b82ff',min:0,max:100},
  {key:'亲密',color:'#ffb3c8',min:0,max:100},
  {key:'默契',color:'#8fd0ff',min:0,max:100},
  {key:'安全感',color:'#7fce9f',min:0,max:100},
  {key:'心防',color:'#a8a6c8',min:0,max:100},
  {key:'占有欲',color:'#ffcd6b',min:0,max:100},
];
/* 关系 var 的真实形状是 {对象名:{好感..阶段..}} —— 剥掉外层人名层，拿到真正的攻略对象 */
function relUnwrap(val,playerName){
  if(!val||typeof val!=='object')return null;
  if(REL_AXES.some(a=>typeof val[a.key]==='number')||val['阶段'])return val; // 已是内层
  const pk=(playerName&&val[playerName])?playerName:Object.keys(val)[0];
  const inner=pk?val[pk]:null;
  return (inner&&typeof inner==='object')?inner:null;
}

let OV={worlds:[],nexus:{entities:[],links:[]},codex:{count:0},genres:[],llm:{}};
async function refresh(){OV=await api('/overview')}

/* ===================== nav ===================== */
const NAV=[
  {fam:'chat',label:'对话',icon:'💬',href:'#/chat'},
  {fam:'companion',label:'陪伴',icon:'💗',href:'#/companion'},
  {fam:'novel',label:'小说',icon:'✍',href:'#/novel'},
  {fam:'works',label:'作品',icon:'🎴',href:'#/works'},
  {fam:'chars',label:'角色',icon:'👤',href:'#/chars'},
];
function renderNav(active){
  let h=NAV.map(n=>`<a href="${n.href}" data-fam="${n.fam}" class="${active===n.fam?'on':''}">${n.icon} <span class="lbl">${n.label}</span></a>`).join('');
  const resOn=['worldbook','assets','presets'].includes(active);
  h+=`<a href="#/worldbook" data-fam="worldbook" class="${active==='worldbook'?'on':''}">📜 <span class="lbl">世界书</span></a>`;
  h+=`<a href="#/assets" data-fam="assets" class="${active==='assets'?'on':''}">🧩 <span class="lbl">素材</span></a>`;
  h+=`<a href="#/presets" data-fam="presets" class="${active==='presets'?'on':''}">🎚 <span class="lbl">预设</span></a>`;
  h+=`<a href="#/settings" data-fam="settings" class="${active==='settings'?'on':''}">⚙ <span class="lbl">设置</span></a>`;
  el('nav').innerHTML=h;
  const ok=OV.llm&&OV.llm.available;const pill=el('llmpill');
  pill.className='llmpill '+(ok?'ok':'no');pill.textContent=ok?('LLM ✓ '+(OV.llm.provider||'')):'LLM 未配';
  pill.style.cursor='pointer';pill.onclick=()=>location.hash='#/settings';
}

/* ===================== router ===================== */
async function route(){
  const hash=location.hash.slice(1)||'/';
  const p=hash.split('/').filter(Boolean);
  const fam=(hash==='/')?'works':(p[0]||'works');
  renderNav(fam);
  try{
    if(hash==='/'||fam==='works')return viewWorks(p[1]||'gallery',p[2]);
    if(fam==='chat')return viewChat(p[1],p[2]);
    if(fam==='companion')return viewCompanion(p[1],p[2]);
    if(fam==='novel')return viewNovel(p[1],p[2]);
    if(fam==='chars')return viewChars();
    if(fam==='worldbook')return viewWorldbook(p[1]);
    if(fam==='assets')return viewAssets();
    if(fam==='presets')return viewPresets();
    if(fam==='settings')return viewSettings();
    if(fam==='farewell')return openFarewell(p[1],p[2]);
    viewWorks('gallery');
  }catch(e){app().innerHTML=`<div class="wrap"><div class="empty">✗ ${esc(e.message)}</div></div>`;}
}

/* helper: a world's primary entity id */
async function firstEntity(wid){const w=await api('/world/'+wid);
  if(!w.entities.length)return null;
  const main=w.entities.find(e=>e.role==='main')||w.entities[0];return main.id;}

/* ===================== 作品 / works ===================== */
async function viewWorks(sub,arg){
  loading();
  const W=OV.worlds;
  const modebar=`<div class="modebar"><span class="ml">用任意玩法开局：</span>
    <span class="mchip core" onclick="location.hash='#/chat'">💬 对话RP</span>
    <span class="mchip core" onclick="location.hash='#/novel'">✍ 小说</span>
    <span class="mchip core" onclick="location.hash='#/companion'">💗 陪伴</span>
    <span class="mchip" title="后续接入">🎮 CYOA</span><span class="mchip" title="后续接入">🎬 剧本</span>
    <span class="mchip" title="后续接入">🖼 漫画</span><span class="mchip" title="后续接入">🎲 跑团</span>
    <span class="mchip" title="后续接入">🌙 梦境</span></div>`;
  const head=`<div class="page-head"><h1>作品</h1><span class="sub">世界孕育故事，故事留下回响</span>
    <div class="viewsw">
      <span class="vbtn ${sub==='gallery'?'on':''}" onclick="location.hash='#/works/gallery'">▦ 画廊</span>
      <span class="vbtn ${sub==='nexus'?'on':''}" onclick="location.hash='#/works/nexus'">✦ 星图</span>
      <span class="vbtn ${sub==='chron'?'on':''}" onclick="location.hash='#/works/chron'">📜 编年史</span>
    </div></div>`;

  if(sub==='nexus')return worksNexus(head);
  if(sub==='chron')return worksChron(head,arg);

  const cards=W.map(w=>{
    const cc=coverClass(w.genre);
    const tags=(w.genre||'').split(/[\s/·,，]+/).filter(Boolean).slice(0,3)
      .map((t,i)=>`<span class="tag ${['v','c','g'][i]||''}">${esc(t)}</span>`).join('');
    return `<div class="work" onclick="openWork('${w.id}')">
      <div class="cover ${cc}"><div class="vig"></div><div class="sigil">${sigil(w.genre)}</div></div>
      <div class="body"><h3>${esc(w.name)}</h3>
        <div class="desc">${esc(w.genre||'')} · ${w.threads} 条世界线 · ${w.entities} 个角色${w.provenance==='forge'?' · AIGC 锻造':''}</div>
        <div class="tags">${tags}</div>
        <div class="foot"><span>by 你</span><span>${w.entities} 👤 · ${w.threads} 📖</span></div></div>
      <div class="menu" onclick="event.stopPropagation();worldMenu('${jsq(w.id)}','${jsq(w.name)}')">⋯</div></div>`;
  }).join('');
  const newcard=`<div class="work newcard" onclick="actNewWorld()"><div><div style="font-size:34px">＋</div><div style="margin-top:8px">新建作品</div><div style="font-size:12px;margin-top:4px">手写 · 导入卡 · ✨ AI 制作</div></div></div>`;
  app().innerHTML=`<div class="wrap">${head}${modebar}
    <div class="toolrow"><div class="searchbar">🔍 <input id="wsearch" placeholder="搜索作品…"></div>
      <button class="btn ghost sm" onclick="actImportCard()">⤓ 导入卡</button>
      <button class="btn sm" onclick="actNewWorld()">＋ 新建作品</button></div>
    <div class="works" id="worksgrid">${W.length?cards+newcard:newcard}</div>
    ${W.length?'':'<p class="note" style="text-align:center;margin-top:20px">还没有作品。点「新建作品」或导入角色卡；也可在终端跑 <code>python -m sim.seed</code> 播一组 demo。</p>'}</div>`;
  const s=el('wsearch');if(s)s.oninput=()=>{const q=s.value.trim().toLowerCase();
    document.querySelectorAll('#worksgrid .work:not(.newcard)').forEach((c,i)=>{const w=W[i];
      c.style.display=(!q||((w.name+w.genre).toLowerCase().includes(q)))?'':'none';});};
}
function openWork(wid){location.hash='#/chat/'+wid;}
function worldMenu(wid,name){
  openModal(`<h3>${esc(name)}</h3>
    <div class="modal-actions" style="flex-wrap:wrap;justify-content:flex-start;gap:8px">
      <button class="btn ghost sm" onclick="closeModal();location.hash='#/chat/${wid}'">💬 对话</button>
      <button class="btn ghost sm" onclick="closeModal();location.hash='#/novel/${wid}'">✍ 小说</button>
      <button class="btn ghost sm" onclick="closeModal();location.hash='#/worldbook/${wid}'">📜 世界书</button>
      <button class="btn ghost sm" onclick="closeModal();location.hash='#/works/chron/${wid}'">📜 编年史</button>
      <button class="btn ghost sm" style="border-color:#5a2336;color:var(--bad)" onclick="actDelWorld('${jsq(wid)}','${jsq(name)}')">🗑 删除</button>
    </div>`);
}
function worksNexus(head){
  const W=OV.worlds,X=OV.nexus.entities,L=OV.nexus.links;
  const cx=400,cy=170,R=130,vw=800,vh=360;const pos={};
  W.forEach((w,i)=>{const a=-Math.PI/2+i*2*Math.PI/Math.max(1,W.length);pos[w.id]=[cx+R*Math.cos(a),cy+R*Math.sin(a)];});
  let edges='';for(const e of L){const a=pos[e.a],b=pos[e.b];if(a&&b){
    edges+=`<line class="nx-edge" x1="${a[0]}" y1="${a[1]}" x2="${b[0]}" y2="${b[1]}"/><text class="nx-elabel" x="${(a[0]+b[0])/2}" y="${(a[1]+b[1])/2-4}">${esc(e.relation||'')}</text>`;}}
  // 跨世界角色标在其化身世界之间
  for(const x of X){const incs=x.incarnations||[];for(let i=0;i<incs.length-1;i++){const a=pos[incs[i]],b=pos[incs[i+1]];
    if(a&&b)edges+=`<text class="nx-elabel" x="${(a[0]+b[0])/2}" y="${(a[1]+b[1])/2+14}" style="fill:var(--violet)">${esc(x.name)} ✦</text>`;}}
  const colors=['#a98bff','#5fe3d2','#ffce86','#97c459','#ff8fb0'];
  let nodes='';W.forEach((w,i)=>{const[x,y]=pos[w.id];const c=colors[i%colors.length];
    nodes+=`<g class="nx-node" onclick="location.hash='#/works/chron/${w.id}'"><circle cx="${x}" cy="${y}" r="34" fill="#16162a" stroke="${c}"/><text class="nx-name" x="${x}" y="${y+54}">${esc(w.name)}</text></g>`;});
  app().innerHTML=`<div class="wrap">${head}
    <p class="lead" style="margin:6px 0 14px">你创造的世界与角色如何彼此相连 —— 连线上标的是世界间的关系，以及在两个世界间穿行的角色（✦ 跨世界）。</p>
    ${W.length?`<div class="nexusmap"><svg viewBox="0 0 ${vw} ${vh}" xmlns="http://www.w3.org/2000/svg">${edges}${nodes}</svg></div>`:'<div class="empty">还没有世界。</div>'}
    ${X.length?`<p class="note">跨世界角色：${X.map(x=>`<a style="color:var(--violet)" onclick="location.hash='#/chars'">${esc(x.name)} ✦</a>`).join('、')}</p>`:'<p class="note">还没有跨世界角色。在角色页把一个角色「提取为魂」，它就能穿行别的世界。</p>'}</div>`;
}
async function worksChron(head,wid){
  if(!wid)wid=(OV.worlds[0]||{}).id;
  if(!wid){app().innerHTML=`<div class="wrap">${head}<div class="empty">还没有世界。</div></div>`;return;}
  let d;try{d=await api('/timeline/'+wid)}catch(e){app().innerHTML=`<div class="wrap">${head}<div class="empty">${esc(e.message)}</div></div>`;return;}
  const sel=`<select onchange="location.hash='#/works/chron/'+this.value" style="background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:7px 11px;color:var(--ink);font:inherit">${OV.worlds.map(w=>`<option value="${w.id}" ${w.id===wid?'selected':''}>${esc(w.name)}</option>`).join('')}</select>`;
  const evs=d.events.map(e=>{
    if(e.kind==='growth')return `<div class="cev star"><div class="w">${esc(e.where||'')} · ${esc(e.name||'')}</div><div class="h">★ 成长时刻 <span class="star">★</span></div><div class="d">${esc(e.text)}</div></div>`;
    return `<div class="cev"><div class="w">${esc(e.where||'')} · ${esc(e.lens||'')} · ${esc(e.thread_title||'')}</div><div class="h">${esc(e.text).slice(0,40)}</div><div class="d">${esc(e.text)}</div></div>`;
  }).join('');
  const xw=(d.cross_world||[]).map(id=>`<div class="cev xw"><div class="w">— · 跨世界</div><div class="h">${esc(id)} 在此有化身</div><div class="d">一个灵魂带着别处的记忆，降临此世界。</div></div>`).join('');
  app().innerHTML=`<div class="wrap">${head}
    <div style="display:flex;align-items:center;gap:12px;margin:6px 0 16px"><span class="lead">《${esc(d.name)}》编年史 —— 跨所有世界线的事件与 ★ 成长，跨世界去向也标在这里。</span><span style="flex:1"></span>${sel}</div>
    <div class="chron">${evs+xw||'<div class="empty">还没有事件 —— 在对话里推几轮、或写一章，就会沉淀到这里。</div>'}</div></div>`;
}

/* ===================== 角色 / chars ===================== */
async function viewChars(){
  loading();
  const lists=await Promise.all(OV.worlds.map(w=>api('/world/'+w.id).then(d=>({w,ents:d.entities})).catch(()=>({w,ents:[]}))));
  const xids=new Set(OV.nexus.entities.map(e=>e.id));
  const xmap={};OV.nexus.entities.forEach(e=>xmap[e.id]=e);
  let cards=[];
  for(const {w,ents} of lists)for(const e of ents){
    const cross=xids.has(e.id);const inc=cross?(xmap[e.id].incarnations||[]):[];
    cards.push({wid:w.id,wname:w.name,genre:w.genre,...e,cross,inc});
  }
  const html=cards.map(c=>`<div class="charcard" onclick="location.hash='#/companion/${c.wid}/${c.id}'">
    ${c.cross?'<span class="xw">✦ 跨世界</span>':''}
    <div class="av ${coverClass(c.genre)}"></div>
    <h3>${esc(c.name)}</h3><div class="role">${esc(c.role||'')}</div>
    <div class="from">出自《${esc(c.wname)}》</div>
    ${c.cross&&c.inc.length?`<div class="incar">✦ 现身于 ${c.inc.map(esc).join(' · ')}</div>`:''}</div>`).join('');
  const newcard=`<div class="charcard newcard" onclick="location.hash='#/works'"><div><div style="font-size:32px">＋</div><div style="margin-top:8px;color:var(--faint)">新建角色（去作品里加）</div></div></div>`;
  app().innerHTML=`<div class="wrap">
    <div class="page-head"><h1>角色</h1><span class="sub">住在你世界里的人 —— 有的，能走出原来的世界</span></div>
    <p class="note" style="margin:8px 0 18px">点角色进入「陪伴」；带 <span style="color:var(--violet)">✦</span> 的是跨世界的魂，可被召唤进别的世界。</p>
    <div class="chars">${cards.length?html+newcard:newcard}</div></div>`;
}

/* ===================== HUD (sandboxed iframe) ===================== */
function _hudIframe(html){
  const theme=getComputedStyle(document.documentElement);
  const vars=['--ink','--dim','--faint','--violet','--cyan','--gold','--surface','--surface2','--line'].map(v=>`${v}:${theme.getPropertyValue(v)||''}`).join(';');
  const body=String(html).replace(/(\d+(?:\.\d+)?)vh\b/g,'calc(var(--sv-vh) * $1)');
  const wrapped=`<!DOCTYPE html><html><head><meta charset="utf-8"><style>:root{${vars};--sv-vh:${window.innerHeight/100}px;color-scheme:dark}*{box-sizing:border-box}html,body{margin:0;overflow:hidden;background:transparent;color:var(--ink,#d8dee5);font-family:system-ui,'Segoe UI',sans-serif;font-size:14px}</style></head><body>${body}<script>(function(){var s=false;function post(){s=false;parent.postMessage({_svh:document.documentElement.scrollHeight},'*')}function h(){if(s)return;s=true;(window.requestAnimationFrame||setTimeout)(post)}if(window.ResizeObserver)new ResizeObserver(h).observe(document.body);[].forEach.call(document.images,function(im){if(!im.complete)im.addEventListener('load',h)});window.addEventListener('load',h);window.onerror=function(m){parent.postMessage({_sverr:String(m)},'*');return false};setTimeout(h,60);h()})()<\/script></body></html>`;

let CHAT=null;
function _av(){return (CHAT&&CHAT.avatar)?('/img/'+CHAT.avatar):''}
function _msgctrl(floor){return (floor!=null&&floor>=0)?`<div class="mtools"><a onclick="traceToggle(${floor})">🔍 溯源</a><a onclick="actEditFloor(${floor})">✎ 编辑</a><a onclick="actRegenFloor(${floor})">🔄 重生成</a><a onclick="actDelFloor(${floor})">🗑 删除</a></div>`:'';}
function _avHtml(){const a=_av();return a?`<img class="cavatar" src="${a}">`:`<div class="cav ${CHAT?coverClass(CHAT.genre):''}"></div>`;}
function bubbleHtml(role,text,floor){
  if(role==='char'){
    const m=String(text).match(/```html\s*([\s\S]*?)```/i);
    const ctrl=_msgctrl(floor);
    const trace=(floor!=null&&floor>=0)?`<div class="trace" id="trace${floor}">${traceBody()}</div>`:'';
    if(m){const prose=esc(String(text).replace(m[0],'').trim());
      return `<div class="brow char msg">${_avHtml()}<div class="bcol"><div class="bubble char">${prose?prose+'<br>':''}${_hudIframe(m[1])}</div>${ctrl}${trace}</div></div>`;}
    return `<div class="brow char msg">${_avHtml()}<div class="bcol"><div class="bubble char">${esc(text)}</div>${ctrl}${trace}</div></div>`;
  }
  return `<div class="brow user"><div class="bubble user">${esc(text)}</div></div>`;}
function traceBody(){const an=(CHAT&&CHAT.anchors)||[];
  return `<div class="tt">⌖ 这句话从哪来</div>
    <div class="tr"><span class="tk">起作用锚点</span><span>${an.length?an.map(a=>`<span class="tag2">${esc(a)}</span>`).join(''):'（暂无锚点）'}</span></div>
    <div class="tr"><span class="tk">说明</span><span style="color:var(--faint)">世界书触发明细与记忆检索权重，引擎已记录，尚未在此接口暴露。</span></div>`;}
function traceToggle(f){const t=el('trace'+f);if(t)t.classList.toggle('on');}
function _addBubble(role,text){const box=el('chatbox');const w=document.createElement('div');
  w.innerHTML=bubbleHtml(role,text);const row=w.firstElementChild;box.appendChild(row);
  scrollChat();return row.querySelector('.bubble');}
function scrollChat(){const s=document.querySelector('.scroll');if(s)s.scrollTop=s.scrollHeight;}
function _lastCharBubble(){const rows=el('chatbox').querySelectorAll('.brow.char .bubble');return rows[rows.length-1]||null;}

function updateSwBar(r){const c=el('swcount');if(c&&r&&typeof r.swipe_n==='number')c.textContent=((r.swipe_id||0)+1)+'/'+r.swipe_n;
  if(r&&r.vars)renderVars(r.vars);if(r&&r.var_changed&&r.var_changed.length)toast('变量更新：'+r.var_changed.join('、'));}
async function chatSwipe(delta){if(!CHAT)return;const tgt=_lastCharBubble();if(!tgt)return;

  try{const r=await post('/chat/swipe',{world:CHAT.wid,entity:CHAT.eid,delta});

function renderVars(v){const box=el('varpanel');if(!box)return;

  box.innerHTML=ks.map(k=>{const m=meta[k]||{},val=v[k];const label=esc(m.label||k),icon=m.icon?'':'';
    if(m.vis==='rel'){const rel=relUnwrap(val,CHAT&&CHAT.playerName);
      if(rel){
        const stg=rel['阶段']?`<span class="stage" style="padding:2px 10px;font-size:11px">${esc(rel['阶段'])}</span>`:'';
        const axes=REL_AXES.filter(a=>typeof rel[a.key]==='number').slice(0,5).map(a=>{

        return `<div style="margin-bottom:10px"><div class="vh" style="margin-bottom:8px"><span class="vn">${label}</span>${stg}</div>${axes}<a class="note" style="color:var(--violet);cursor:pointer" onclick="location.hash='#/companion/${CHAT.wid}/${CHAT.eid}'">完整关系板 ›</a></div>`;

  function recountCtx(){let chars=CHAT.base_chars||0;
    const bs=[...document.querySelectorAll('#chatbox .bubble')].slice(-(CHAT.histWin||12));
    bs.forEach(b=>chars+=(b.textContent||'').length);
    const tok=Math.round(chars/1.6);CHAT.tok=tok;updateConsole();}
  CHAT.recountCtx=recountCtx;

  const finalize=(bubble,r)=>{finalizeBubble(bubble,r);};
  const sendBlocking=async(bubble,msg)=>{const r=await post('/chat',{world:wid,entity:eid,message:msg});finalize(bubble,r);};
  let abort=null,deltasSeen=0;
  const setBusy=b=>{const s=el('chatsend'),st=el('chatstop'),inp=el('chatmsg'),qb=el('qrbar');
    if(s)s.style.display=b?'none':'';if(st)st.style.display=b?'':'none';if(inp)inp.disabled=b;
    if(qb){qb.style.pointerEvents=b?'none':'';qb.style.opacity=b?'0.5':'';}};
  const sendStream=async(bubble,msg)=>{
    deltasSeen=0;abort=new AbortController();
    const resp=await fetch('/api/chat/stream',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({world:wid,entity:eid,message:msg}),signal:abort.signal});
    if(!resp.ok||!resp.body)throw new Error('stream unavailable');
    const reader=resp.body.getReader(),dec=new TextDecoder();let buf='',acc='',fin=null;
    for(;;){const{value,done}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});let i;
      while((i=buf.indexOf('\n\n'))>=0){const line=buf.slice(0,i).split('\n').find(l=>l.startsWith('data:'));buf=buf.slice(i+2);
        if(!line)continue;let o;try{o=JSON.parse(line.slice(5).trim())}catch(e){continue}
        if(o.t!=null){const s=document.querySelector('.scroll');const nearBottom=s?(s.scrollHeight-s.scrollTop-s.clientHeight<80):true;
          deltasSeen++;acc+=o.t;bubble.classList.remove('typing');bubble.textContent=acc;recountCtx();if(nearBottom)scrollChat();}
        else if(o.done)fin=o;}}
    if(fin&&fin.error){const err=new Error(fin.error);err.partial=acc;throw err;}
    if(fin&&fin.available===false){bubble.textContent=fin.reply;return;}
    finalize(bubble,fin||{reply:acc});};
  const send=async(forced)=>{
    if(CHAT.busy)return;
    const inp=el('chatmsg');const msg=(forced!=null?forced:inp.value).trim();if(!msg)return;
    if(forced==null)inp.value='';autoGrow(inp);
    // 首发处理开场白:有真实开场白(greetings 非空)→ 后端会把它落成 floor 0,所以这里把 .opening 替换为真实的 floor-0 气泡,
    // 让 DOM 行与后端 history 一一对应(否则楼层会错位,编辑/删除会打到上一行)。无真实开场白时(仅占位)→ 直接移除。
    const op=document.querySelector('#chatbox .opening');
    if(op){if((CHAT.greetings||[]).length>0){const g=document.createElement('div');g.innerHTML=bubbleHtml('char',CHAT.greetingText||'',0);op.replaceWith(g.firstElementChild);}else{op.remove();}}
    _addBubble('user',msg);const w=_addBubble('char','…');w.classList.add('typing');
    CHAT.busy=true;setBusy(true);CHAT.stopped=false;
    try{
      if(d.llm_available){
        try{await sendStream(w,msg);}
        catch(e){if(CHAT.stopped)throw e;if(deltasSeen>0){w.textContent=(w.textContent||'')+'\n✗ 中断：'+e.message;throw e;}await sendBlocking(w,msg);}
      }else{await sendBlocking(w,msg);}
    }catch(e){if(CHAT.stopped){w.classList.remove('typing');if(!w.textContent||w.textContent==='…')w.textContent='（已停止）';else w.textContent+=' ⏹';}
      else if(!w.textContent.includes('✗')){w.textContent='✗ '+e.message;}}
    finally{CHAT.busy=false;setBusy(false);recountCtx();inp.focus();}};
  CHAT.send=send;

  const ta=el('chatmsg');

    :`<button class="btn ghost sm" onclick="actExtract('${jsq(wid)}','${jsq(eid)}','${jsq(name)}')">✦ 带 ${esc(name)} 离开这个世界（先提取为魂）</button>`;

  app().innerHTML=`<div class="wrap">
    <div class="page-head"><h1>陪伴</h1><span class="sub">一个一直在的人</span>
      <span style="flex:1"></span><button class="btn ghost sm" onclick="location.hash='#/chat/${wid}/${eid}'">💬 进入对话</button></div>
    <div class="comp" style="margin-top:18px">

        <div class="portrait ${portraitCls}" ${portrait}><div class="vig"></div><div class="name"><b>${esc(name)}</b><span>出自《${esc(world.name||wid)}》${soulId?' · 🜂 魂':''}</span></div></div>

        </div>
      </div>
      <div class="compmain">
        <section><h2>关系 <small>你们之间发生过的事的总和</small></h2>${stageHtml}${relHtml}</section>
        <section><h2>她是谁 <small>不会变的内核 · 锚点</small></h2>
          <div class="kwrow">${(ent.anchors&&ent.anchors.length)?ent.anchors.map(a=>`<span class="kw">${esc(a)}</span>`).join(''):'<span class="note">还没有锚点 —— 提取为魂后会沉淀出来。</span>'}</div></section>

          <button class="sendbtn" onclick="compSend('${wid}','${eid}')">➤</button></div></div>
      </div>
    </div></div>`;

/* ===================== modal / forms ===================== */
function closeModal(){const o=document.querySelector('.overlay');if(o)o.remove();}
function openModal(html){closeModal();const o=document.createElement('div');o.className='overlay';
  o.onclick=e=>{if(e.target===o)closeModal();};o.innerHTML='<div class="modal">'+html+'</div>';document.body.appendChild(o);return o;}
function formModal(title,fields,submitLabel,onSubmit,aux){
  const body=fields.map(f=>{
    if(f.type==='select')return `<div class="field"><label>${esc(f.label)}</label><select id="f_${f.n}">${f.options.map(o=>`<option ${o===f.value?'selected':''}>${esc(o)}</option>`).join('')}</select></div>`;
    if(f.type==='textarea')return `<div class="field"><label>${esc(f.label)}</label><textarea id="f_${f.n}" rows="${f.rows||4}" placeholder="${esc(f.ph||'')}">${esc(f.value||'')}</textarea></div>`;
    return `<div class="field"><label>${esc(f.label)}</label><input id="f_${f.n}" placeholder="${esc(f.ph||'')}" value="${esc(f.value||'')}"></div>`;
  }).join('');
  const auxBtn=aux?`<button class="btn ghost" id="m_aux" style="margin-right:auto">${esc(aux.label)}</button>`:'';
  const o=openModal(`<h3>${esc(title)}</h3>${body}<div class="err" id="m_err"></div>
    <div class="modal-actions">${auxBtn}<button class="btn ghost" onclick="closeModal()">取消</button><button class="btn" id="m_ok">${esc(submitLabel)}</button></div>`);
  const vals=()=>{const v={};fields.forEach(f=>v[f.n]=o.querySelector('#f_'+f.n).value.trim());return v;};
  const setF=(n,val)=>{const e=o.querySelector('#f_'+n);if(e)e.value=val;};
  o.querySelector('#m_ok').onclick=async()=>{try{await onSubmit(vals());}catch(e){o.querySelector('#m_err').textContent='✗ '+e.message;}};
  if(aux){const ab=o.querySelector('#m_aux');ab.onclick=async()=>{const t0=ab.textContent;ab.textContent='生成中…';ab.disabled=true;
    try{await aux.run(vals(),setF);}catch(e){o.querySelector('#m_err').textContent='✗ '+e.message;}finally{ab.textContent=t0;ab.disabled=false;}};}
  return o;
}

  formModal(`✦ 召唤 ${name} 降临别的世界`,[
    {n:'world',label:'目标世界',type:'select',options:ids},
    {n:'entry',label:'进入方式',type:'select',options:['本体进','换皮进']},
  ],'召唤 ✦',async v=>{const r=await post('/summon-soul',{soul,world:v.world,entry:v.entry});closeModal();await refresh();
    toast(`✦ ${name} 已降临《${v.world}》——带着记忆。`);location.hash='#/companion/'+v.world+'/'+(r.incarnation||r.as||r.entity||'');});}

/* ===================== farewell ===================== */
function openFarewell(wid,eid){ /* reserved for direct link */ route(); }

/* ===================== mascot / console ===================== */
function updateConsole(){const box=el('kbconsole');if(!box)return;
  if(CHAT&&location.hash.startsWith('#/chat')){const tok=CHAT.tok||0;box.textContent=`⌬ ≈${tok>=1000?(tok/1000).toFixed(1)+'k':tok} tok · ${CHAT.name||''}`;}
  else box.textContent=`⌬ ${OV.worlds.length} 世界 · ${OV.nexus.entities.length} 跨世界`;}
(function(){const mini=el('kbmini'),stage=el('kbstage'),close=el('kbclose');
  mini.onclick=()=>{stage.classList.add('on');mini.style.display='none';updateConsole();};
  close.onclick=()=>{stage.classList.remove('on');mini.style.display='';};})();

/* ===================== boot ===================== */
window.addEventListener('hashchange',async()=>{await route();
  // companion → chat handoff
  if(window._pendingMsg&&CHAT&&CHAT.send){const m=window._pendingMsg;window._pendingMsg=null;setTimeout(()=>CHAT.send(m),120);}
});
(async()=>{try{await refresh();}catch(e){toast('✗ 无法连接后端：'+e.message,true);}await route();})();
</script>
</body>
</html>
