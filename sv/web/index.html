<script>
/* ===================== helpers ===================== */
const esc=(s)=>(s==null?'':(''+s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
/* jsq：把值安全嵌进“双引号属性里的单引号 JS 字符串”——先做 JS 转义(\ ' 换行)，再交给 esc 做属性转义 */
const jsq=(s)=>esc(String(s==null?'':s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\r/g,'').replace(/\n/g,'\\n'));
async function api(p){const r=await fetch('/api'+p);if(!r.ok)throw new Error((await r.json().catch(()=>({}))).error||r.status);return r.json()}
async function post(p,b){const r=await fetch('/api'+p,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});
  const j=await r.json();if(!r.ok||j.ok===false)throw new Error(j.error||r.status);return j}
function toast(msg,bad){const t=document.createElement('div');t.className='toast'+(bad?' bad':'');t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),4200)}
function md(t){const lines=(t||'').split('\n');let h='',ul=false;const cu=()=>{if(ul){h+='</ul>';ul=false}};
  for(let ln of lines){
    if(/^###\s/.test(ln)){cu();h+='<h3>'+esc(ln.slice(4))+'</h3>'}
    else if(/^##\s/.test(ln)){cu();h+='<h2>'+esc(ln.slice(3))+'</h2>'}
    else if(/^#\s/.test(ln)){cu();h+='<h1>'+esc(ln.slice(2))+'</h1>'}
    else if(/^>\s?/.test(ln)){cu();h+='<blockquote>'+inl(ln.replace(/^>\s?/,''))+'</blockquote>'}
    else if(/^[-*]\s/.test(ln)){if(!ul){h+='<ul>';ul=true}h+='<li>'+inl(ln.slice(2))+'</li>'}
    else if(ln.trim()===''){cu()}
    else{cu();h+='<p>'+inl(ln)+'</p>'}}
  cu();return h}
function inl(s){return esc(s).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/`(.+?)`/g,'<code>$1</code>')}
const el=(id)=>document.getElementById(id);
const app=()=>el('app');
function loading(){app().innerHTML='<div class="loading">载入中…</div>';}

/* genre → cover + sigil */
function coverClass(g){g=g||'';
  if(/赛博|cyber|科幻|霓虹|未来|机甲|星际/.test(g))return'cv-cyber';
  if(/武侠|仙侠|江湖|玄幻|修真|古风|黑道|无限/.test(g))return'cv-wuxia';
  if(/治愈|日常|校园|青春|日式|恋爱|甜/.test(g))return'cv-heal';
  return'cv-night';}
function sigil(g){g=g||'';
  if(/赛博|cyber|科幻|霓虹|机甲|星际/.test(g))return'🌧️';
  if(/武侠|仙侠|江湖|玄幻|修真|无限/.test(g))return'⚔️';
  if(/都市|黑道/.test(g))return'🌃';
  if(/治愈|日常|校园|青春|日式/.test(g))return'⛩️';
  return'🌌';}
function avBg(rel,genre){return rel?`background-image:url('/img/${esc(rel)}')`:'';}

/* 关系攻略轴(镜像 sv/attrs.REL_AXES,纯展示元) */
const REL_AXES=[
  {key:'好感',color:'#ff8fb0',min:-100,max:100},
  {key:'心动',color:'#ff6b9c',min:0,max:100},
  {key:'信任',color:'#5ee0d0',min:-100,max:100},
  {key:'依赖',color:'#9b82ff',min:0,max:100},
  {key:'亲密',color:'#ffb3c8',min:0,max:100},
  {key:'默契',color:'#8fd0ff',min:0,max:100},
  {key:'安全感',color:'#7fce9f',min:0,max:100},
  {key:'心防',color:'#a8a6c8',min:0,max:100},
  {key:'占有欲',color:'#ffcd6b',min:0,max:100},
];
/* 关系 var 的真实形状是 {对象名:{好感..阶段..}} —— 剥掉外层人名层，拿到真正的攻略对象 */
function relUnwrap(val,playerName){
  if(!val||typeof val!=='object')return null;
  if(REL_AXES.some(a=>typeof val[a.key]==='number')||val['阶段'])return val; // 已是内层
  const pk=(playerName&&val[playerName])?playerName:Object.keys(val)[0];
  const inner=pk?val[pk]:null;
  return (inner&&typeof inner==='object')?inner:null;
}

let OV={worlds:[],nexus:{entities:[],links:[]},codex:{count:0},genres:[],llm:{}};
async function refresh(){OV=await api('/overview')}

/* ===================== nav ===================== */
const NAV=[
  {fam:'chat',label:'对话',icon:'💬',href:'#/chat'},
  {fam:'companion',label:'陪伴',icon:'💗',href:'#/companion'},
  {fam:'novel',label:'小说',icon:'✍',href:'#/novel'},
  {fam:'works',label:'作品',icon:'🎴',href:'#/works'},
  {fam:'chars',label:'角色',icon:'👤',href:'#/chars'},
];
function renderNav(active){
  const main=NAV.map(n=>`<a href="${n.href}" data-fam="${n.fam}" class="${active===n.fam?'on':''}">${n.icon} <span class="lbl">${n.label}</span></a>`).join('');
  const resOn=['worldbook','assets','presets'].includes(active);
  const drop=`<div class="navdrop ${resOn?'on':''}"><span class="dt" onclick="this.closest('.navdrop').classList.toggle('open')">🗂 <span class="lbl">资源</span> <span style="font-size:10px;opacity:.7">▾</span></span>
    <div class="navmenu"><div class="inner">
      <a href="#/worldbook" class="${active==='worldbook'?'on':''}">📜 世界书</a>
      <a href="#/assets" class="${active==='assets'?'on':''}">🧩 素材</a>
      <a href="#/presets" class="${active==='presets'?'on':''}">🎚 预设</a>
    </div></div></div>`;
  const settings=`<a href="#/settings" data-fam="settings" class="${active==='settings'?'on':''}">⚙ <span class="lbl">设置</span></a>`;
  el('nav').innerHTML=main+drop+settings;
  const ok=OV.llm&&OV.llm.available;const pill=el('llmpill');
  pill.className='llmpill '+(ok?'ok':'no');pill.textContent=ok?('LLM ✓ '+(OV.llm.provider||'')):'LLM 未配';
  pill.style.cursor='pointer';pill.onclick=()=>location.hash='#/settings';
}

/* ===================== router ===================== */
async function route(){
  const hash=location.hash.slice(1)||'/';
  const p=hash.split('/').filter(Boolean);
  const fam=(hash==='/')?'works':(p[0]||'works');
  renderNav(fam);
  try{
    if(hash==='/'||fam==='works')return viewWorks(p[1]||'gallery',p[2]);
    if(fam==='chat')return viewChat(p[1],p[2]);
    if(fam==='companion')return viewCompanion(p[1],p[2]);
    if(fam==='novel')return viewNovel(p[1],p[2]);
    if(fam==='chars')return viewChars();
    if(fam==='worldbook')return viewWorldbook(p[1]);
    if(fam==='assets')return viewAssets();
    if(fam==='presets')return viewPresets();
    if(fam==='settings')return viewSettings();
    if(fam==='farewell')return openFarewell(p[1],p[2]);
    viewWorks('gallery');
  }catch(e){app().innerHTML=`<div class="wrap"><div class="empty">✗ ${esc(e.message)}</div></div>`;}
}

/* helper: a world's primary entity id */
async function firstEntity(wid){const w=await api('/world/'+wid);
  if(!w.entities.length)return null;
  const main=w.entities.find(e=>e.role==='main')||w.entities[0];return main.id;}

/* ===================== 作品 / works ===================== */
async function viewWorks(sub,arg){
  loading();
  const W=OV.worlds;
  const modebar=`<div class="modebar"><span class="ml">用任意玩法开局：</span>
    <span class="mchip core" onclick="location.hash='#/chat'">💬 对话RP</span>
    <span class="mchip core" onclick="location.hash='#/novel'">✍ 小说</span>
    <span class="mchip core" onclick="location.hash='#/companion'">💗 陪伴</span>
    <span class="ml" style="margin-left:8px">衍生镜头（小说页「一稿多吃」转换）：</span>
    <span class="mchip" onclick="location.hash='#/novel'" title="小说→CYOA">🎮 CYOA</span><span class="mchip" onclick="location.hash='#/novel'" title="事件线→剧本">🎬 剧本</span>
    <span class="mchip" onclick="location.hash='#/novel'" title="小说→漫画分镜">🖼 漫画</span><span class="mchip" onclick="location.hash='#/novel'" title="事件线→跑团">🎲 跑团</span></div>`;
  const head=`<div class="page-head"><h1>作品</h1><span class="sub">世界孕育故事，故事留下回响</span>
    <div class="viewsw">
      <span class="vbtn ${sub==='gallery'?'on':''}" onclick="location.hash='#/works/gallery'">▦ 画廊</span>
      <span class="vbtn ${sub==='nexus'?'on':''}" onclick="location.hash='#/works/nexus'">✦ 星图</span>
      <span class="vbtn ${sub==='chron'?'on':''}" onclick="location.hash='#/works/chron'">📜 编年史</span>
    </div></div>`;

  if(sub==='nexus')return worksNexus(head);
  if(sub==='chron')return worksChron(head,arg);

  const cards=W.map(w=>{
    const cc=coverClass(w.genre);
    const tags=(w.genre||'').split(/[\s/·,，]+/).filter(Boolean).slice(0,3)
      .map((t,i)=>`<span class="tag ${['v','c','g'][i]||''}">${esc(t)}</span>`).join('');
    return `<div class="work" onclick="openWork('${w.id}')">
      <div class="cover ${cc}"><div class="vig"></div><div class="sigil">${sigil(w.genre)}</div></div>
      <div class="body"><h3>${esc(w.name)}</h3>
        <div class="desc">${esc(w.genre||'')} · ${w.threads} 条世界线 · ${w.entities} 个角色${w.provenance==='forge'?' · AIGC 锻造':''}</div>
        <div class="tags">${tags}</div>
        <div class="foot"><span>by 你</span><span>${w.entities} 👤 · ${w.threads} 📖</span></div></div>
      <div class="menu" onclick="event.stopPropagation();worldMenu('${jsq(w.id)}','${jsq(w.name)}')">⋯</div></div>`;
  }).join('');
  const newcard=`<div class="work newcard" onclick="actNewWorld()"><div><div style="font-size:34px">＋</div><div style="margin-top:8px">新建作品</div><div style="font-size:12px;margin-top:4px">手写 · 导入卡 · ✨ AI 制作</div></div></div>`;
  app().innerHTML=`<div class="wrap">${head}${modebar}
    <div class="toolrow"><div class="searchbar">🔍 <input id="wsearch" placeholder="搜索作品…"></div>
      <button class="btn ghost sm" onclick="actImportCard()">⤓ 导入卡</button>
      <button class="btn sm" onclick="actNewWorld()">＋ 新建作品</button></div>
    <div class="works" id="worksgrid">${W.length?cards+newcard:newcard}</div>
    ${W.length?'':'<p class="note" style="text-align:center;margin-top:20px">还没有作品。点「新建作品」或导入角色卡；也可在终端跑 <code>python -m sim.seed</code> 播一组 demo。</p>'}</div>`;
  const s=el('wsearch');if(s)s.oninput=()=>{const q=s.value.trim().toLowerCase();
    document.querySelectorAll('#worksgrid .work:not(.newcard)').forEach((c,i)=>{const w=W[i];
      c.style.display=(!q||((w.name+w.genre).toLowerCase().includes(q)))?'':'none';});};
}
function openWork(wid){location.hash='#/chat/'+wid;}
function worldMenu(wid,name){
  openModal(`<h3>${esc(name)}</h3>
    <div class="modal-actions" style="flex-wrap:wrap;justify-content:flex-start;gap:8px">
      <button class="btn ghost sm" onclick="closeModal();location.hash='#/chat/${wid}'">💬 对话</button>
      <button class="btn ghost sm" onclick="closeModal();location.hash='#/novel/${wid}'">✍ 小说</button>
      <button class="btn ghost sm" onclick="closeModal();location.hash='#/worldbook/${wid}'">📜 世界书</button>
      <button class="btn ghost sm" onclick="closeModal();location.hash='#/works/chron/${wid}'">📜 编年史</button>
      <button class="btn ghost sm" style="border-color:#5a2336;color:var(--bad)" onclick="actDelWorld('${jsq(wid)}','${jsq(name)}')">🗑 删除</button>
    </div>`);
}
function worksNexus(head){
  const W=OV.worlds,X=OV.nexus.entities,L=OV.nexus.links;
  const cx=400,cy=170,R=130,vw=800,vh=360;const pos={};
  W.forEach((w,i)=>{const a=-Math.PI/2+i*2*Math.PI/Math.max(1,W.length);pos[w.id]=[cx+R*Math.cos(a),cy+R*Math.sin(a)];});
  let edges='';for(const e of L){const a=pos[e.a],b=pos[e.b];if(a&&b){
    edges+=`<line class="nx-edge" x1="${a[0]}" y1="${a[1]}" x2="${b[0]}" y2="${b[1]}"/><text class="nx-elabel" x="${(a[0]+b[0])/2}" y="${(a[1]+b[1])/2-4}">${esc(e.relation||'')}</text>`;}}
  // 跨世界角色标在其化身世界之间
  for(const x of X){const incs=x.incarnations||[];for(let i=0;i<incs.length-1;i++){const a=pos[incs[i]],b=pos[incs[i+1]];
    if(a&&b)edges+=`<text class="nx-elabel" x="${(a[0]+b[0])/2}" y="${(a[1]+b[1])/2+14}" style="fill:var(--violet)">${esc(x.name)} ✦</text>`;}}
  const colors=['#a98bff','#5fe3d2','#ffce86','#97c459','#ff8fb0'];
  let nodes='';W.forEach((w,i)=>{const[x,y]=pos[w.id];const c=colors[i%colors.length];
    nodes+=`<g class="nx-node" onclick="location.hash='#/works/chron/${w.id}'"><circle cx="${x}" cy="${y}" r="34" fill="#16162a" stroke="${c}"/><text class="nx-name" x="${x}" y="${y+54}">${esc(w.name)}</text></g>`;});
  app().innerHTML=`<div class="wrap">${head}
    <p class="lead" style="margin:6px 0 14px">你创造的世界与角色如何彼此相连 —— 连线上标的是世界间的关系，以及在两个世界间穿行的角色（✦ 跨世界）。</p>
    ${W.length?`<div class="nexusmap"><svg viewBox="0 0 ${vw} ${vh}" xmlns="http://www.w3.org/2000/svg">${edges}${nodes}</svg></div>`:'<div class="empty">还没有世界。</div>'}

/* ===================== HUD (sandboxed iframe) ===================== */
function _hudIframe(html){
  const theme=getComputedStyle(document.documentElement);
  const vars=['--ink','--dim','--faint','--violet','--cyan','--gold','--surface','--surface2','--line'].map(v=>`${v}:${theme.getPropertyValue(v)||''}`).join(';');
  const body=String(html).replace(/(\d+(?:\.\d+)?)vh\b/g,'calc(var(--sv-vh) * $1)');
  const wrapped=`<!DOCTYPE html><html><head><meta charset="utf-8"><style>:root{${vars};--sv-vh:${window.innerHeight/100}px;color-scheme:dark}*{box-sizing:border-box}html,body{margin:0;overflow:hidden;background:transparent;color:var(--ink,#d8dee5);font-family:system-ui,'Segoe UI',sans-serif;font-size:14px}</style></head><body>${body}<script>(function(){var s=false;function post(){s=false;parent.postMessage({_svh:document.documentElement.scrollHeight},'*')}function h(){if(s)return;s=true;(window.requestAnimationFrame||setTimeout)(post)}if(window.ResizeObserver)new ResizeObserver(h).observe(document.body);[].forEach.call(document.images,function(im){if(!im.complete)im.addEventListener('load',h)});window.addEventListener('load',h);window.onerror=function(m){parent.postMessage({_sverr:String(m)},'*');return false};setTimeout(h,60);h()})()<\/script></body></html>`;
  return `<iframe class="hud" sandbox="allow-scripts" srcdoc="${wrapped.replace(/"/g,'&quot;')}" style="width:100%;border:0;background:transparent;display:block"></iframe>`;
}
window.addEventListener('message',ev=>{const d=ev.data;if(!d)return;
  if(typeof d._svh==='number')document.querySelectorAll('iframe.hud').forEach(f=>{if(f.contentWindow===ev.source)f.style.height=Math.min(d._svh+4,1200)+'px';});
  else if(d._sverr)console.warn('[HUD 面板脚本错误]',d._sverr);});

let CHAT=null;
function _av(){return (CHAT&&CHAT.avatar)?('/img/'+CHAT.avatar):''}
function _msgctrl(floor){return (floor!=null&&floor>=0)?`<div class="mtools"><a onclick="traceToggle(${floor})">🔍 溯源</a><a onclick="actEditFloor(${floor})">✎ 编辑</a><a onclick="actRegenFloor(${floor})">🔄 重生成</a><a onclick="actDelFloor(${floor})">🗑 删除</a></div>`:'';}
function _avHtml(){const a=_av();return a?`<img class="cavatar" src="${a}">`:`<div class="cav ${CHAT?coverClass(CHAT.genre):''}"></div>`;}
function bubbleHtml(role,text,floor){
  if(role==='char'){
    const m=String(text).match(/```html\s*([\s\S]*?)```/i);
    const ctrl=_msgctrl(floor);
    const trace=(floor!=null&&floor>=0)?`<div class="trace" id="trace${floor}"></div>`:'';
    if(m){const prose=esc(String(text).replace(m[0],'').trim());
      return `<div class="brow char msg">${_avHtml()}<div class="bcol"><div class="bubble char">${prose?prose+'<br>':''}${_hudIframe(m[1])}</div>${ctrl}${trace}</div></div>`;}
    return `<div class="brow char msg">${_avHtml()}<div class="bcol"><div class="bubble char">${esc(text)}</div>${ctrl}${trace}</div></div>`;
  }
  return `<div class="brow user"><div class="bubble user">${esc(text)}</div></div>`;}
function renderTrace(d){

  renderVars(d.vars);

    const tok=Math.round(chars/1.6);CHAT.tok=tok;updateConsole();}
  CHAT.recountCtx=recountCtx;

  const finalize=(bubble,r)=>{finalizeBubble(bubble,r);};
  const sendBlocking=async(bubble,msg)=>{const r=await post('/chat',{world:wid,entity:eid,message:msg});finalize(bubble,r);};
  let abort=null,deltasSeen=0;
  const setBusy=b=>{const s=el('chatsend'),st=el('chatstop'),inp=el('chatmsg'),qb=el('qrbar');
    if(s)s.style.display=b?'none':'';if(st)st.style.display=b?'':'none';if(inp)inp.disabled=b;
    if(qb){qb.style.pointerEvents=b?'none':'';qb.style.opacity=b?'0.5':'';}};
  const sendStream=async(bubble,msg)=>{
    deltasSeen=0;abort=new AbortController();
    const resp=await fetch('/api/chat/stream',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({world:wid,entity:eid,message:msg}),signal:abort.signal});
    if(!resp.ok||!resp.body)throw new Error('stream unavailable');
    const reader=resp.body.getReader(),dec=new TextDecoder();let buf='',acc='',fin=null;
    for(;;){const{value,done}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});let i;
      while((i=buf.indexOf('\n\n'))>=0){const line=buf.slice(0,i).split('\n').find(l=>l.startsWith('data:'));buf=buf.slice(i+2);
        if(!line)continue;let o;try{o=JSON.parse(line.slice(5).trim())}catch(e){continue}
        if(o.t!=null){const s=document.querySelector('.scroll');const nearBottom=s?(s.scrollHeight-s.scrollTop-s.clientHeight<80):true;
          deltasSeen++;acc+=o.t;bubble.classList.remove('typing');bubble.textContent=acc;recountCtx();if(nearBottom)scrollChat();}
        else if(o.done)fin=o;}}
    if(fin&&fin.error){const err=new Error(fin.error);err.partial=acc;throw err;}
    if(fin&&fin.available===false){bubble.textContent=fin.reply;return;}

    // 首发处理开场白:有真实开场白(greetings 非空)→ 后端会把它落成 floor 0,所以这里把 .opening 替换为真实的 floor-0 气泡,
    // 让 DOM 行与后端 history 一一对应(否则楼层会错位,编辑/删除会打到上一行)。无真实开场白时(仅占位)→ 直接移除。
    const op=document.querySelector('#chatbox .opening');
    if(op){if((CHAT.greetings||[]).length>0){const g=document.createElement('div');g.innerHTML=bubbleHtml('char',CHAT.greetingText||'',0);op.replaceWith(g.firstElementChild);}else{op.remove();}}
    _addBubble('user',msg);const w=_addBubble('char','…');w.classList.add('typing');
    CHAT.busy=true;setBusy(true);CHAT.stopped=false;
    try{
      if(d.llm_available){
        try{await sendStream(w,msg);}
        catch(e){if(CHAT.stopped)throw e;if(deltasSeen>0){w.textContent=(w.textContent||'')+'\n✗ 中断：'+e.message;throw e;}await sendBlocking(w,msg);}
      }else{await sendBlocking(w,msg);}
    }catch(e){if(CHAT.stopped){w.classList.remove('typing');if(!w.textContent||w.textContent==='…')w.textContent='（已停止）';else w.textContent+=' ⏹';}
      else if(!w.textContent.includes('✗')){w.textContent='✗ '+e.message;}}
    finally{CHAT.busy=false;setBusy(false);recountCtx();inp.focus();}};
  CHAT.send=send;
  el('chatsend').onclick=()=>send();
  el('chatstop').onclick=()=>{CHAT.stopped=true;if(abort)abort.abort();};
  const ta=el('chatmsg');
  ta.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});

        <option value="1" ${e.position==1?'selected':''}>角色描述之后</option>
        <option value="4" ${e.position==4?'selected':''}>对话最近处 @D${e.depth||4}</option></select></div>
      <div class="field"><label>排序优先级</label><input id="wb_order" value="${e.order!=null?e.order:100}"></div>

async function wbSave(uid){const entry={

  const roleTag=r=>r==='user'?'<span class="pill style">user</span>':r==='assistant'?'<span class="pill">assistant</span>':'<span class="pill sys">system</span>';
  const mods=(d.modules||[]).map(m=>{const on=m.enabled!==false;const isMarker=m.marker||!m.content;
    return `<div class="mod"><div class="info"><div class="h">${esc(m.name||m.identifier)} ${roleTag(m.role)}${isMarker?'<span class="pill">占位槽</span>':''}</div>
      <div class="d">${isMarker?'ST 注入占位（由世界书/角色卡在对应位置填充）':esc((m.content||'').slice(0,140))}</div></div>
      ${isMarker?'':`<div class="toggle ${on?'on':''}" title="开/关这个模块" onclick="presetToggle('${jsq(m.identifier)}',${on?'false':'true'})"></div>`}</div>`;}).join('')||'<p class="note">无模块</p>';
  return `<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap">
      <h3 style="margin:0">${esc(d.name)}</h3>${d.active?'<span class="badge" style="background:#62e6a422;color:var(--good)">生效中</span>':''}<span style="flex:1"></span>
      <button class="btn ${d.active?'ghost':''} sm" onclick="presetUse('${jsq(d.active?'':d.id)}')">${d.active?'停用':'启用这套预设'}</button></div>
    <div class="sw-grp">采样参数（导入时自动适配 → 生效后传给模型）</div><div class="tags" style="margin:0 0 16px">${samp}</div>
    <div class="sw-grp">提示词模块 · 逐个可勾（关掉即不注入；空内容的是 ST 占位槽）</div>
    <div class="modlist">${mods}</div>
    <div class="sw-grp">组装后的系统提示（这套预设实际前置注入的）</div>
    <div class="packet" style="max-height:240px;overflow:auto;white-space:pre-wrap;background:#0d0d18;border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:12.5px;color:var(--dim)">${esc(d.assembled||'（空 —— 模块都关了或都是占位槽）')}</div>`;
}
function presetSelect(id){PR.sel=id;renderPresets();}
async function presetToggle(ident,enabled){try{await post('/preset/module',{preset:PR.sel,identifier:ident,enabled:enabled==='true'||enabled===true});renderPresets();}catch(e){toast('✗ '+e.message,true);}}
async function presetUse(pid){try{await post('/config',{SV_PRESET:pid});await refresh();PR.active=pid;toast(pid?'✓ 已启用，对话即时生效':'✓ 已停用');renderPresets();}catch(e){toast('✗ '+e.message,true);}}
async function actPresetUse(pid){return presetUse(pid);}
async function actImportPresetFile(){const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=async()=>{const f=inp.files&&inp.files[0];if(!f)return;const text=await f.text();
    let name=f.name.replace(/\.json$/i,'');try{const j=JSON.parse(text);if(j.name)name=j.name;}catch(e){toast('✗ 不是合法 JSON',true);return;}
    try{const r=await post('/import/preset',{data:text,name});PR.sel=r.preset;await refresh();await viewPresets();
      toast(`✓ 导入「${esc(r.name)}」 —— 模块 ${r.module_count}（自定义 ${r.custom_count}）、采样 ${Object.keys(r.sampling||{}).length} 项`);}
    catch(e){toast('✗ '+e.message,true);}};
  inp.click();}

/* ===================== 设置 / settings ===================== */

  app().innerHTML=`<div class="wrap">
    <div class="page-head"><h1>设置</h1></div>
    <div class="set-tabs" id="settabs" style="margin-top:18px">
      <div class="set-tab on" data-st="api" onclick="settab(this)">模型 API</div>
      <div class="set-tab" data-st="chat" onclick="settab(this)">对话 / 你</div>
      <div class="set-tab" data-st="render" onclick="settab(this)">渲染</div>
      <div class="set-tab" data-st="data" onclick="settab(this)">状态 / 数据</div>
    </div>
    <div class="set-pane on" data-st="api">
      <p class="lead">① 作为 <b>Agent skill</b> 嵌入时走宿主模型，无需配置。② <b>独立运行</b>想让网页/CLI 自己生成，在这里配 LLM。存本机 <code>sv.local.conf</code>（不入库），保存即时生效。</p>
      <div class="row2"><div class="field"><label>provider</label><select id="cf_provider">${opt(['stub','openai','anthropic','ollama'],c.provider)}</select></div>
        <div class="field"><label>model（留空用默认）</label><input id="cf_model" value="${esc(c.model)}" placeholder="claude-sonnet-4-6 / gpt-4o-mini"></div></div>
      ${keyField('cf_openai_key','OPENAI_API_KEY','OpenAI / 兼容端 Key','sk-... 或兼容端 key')}
      <div class="field"><label>OpenAI Base URL（可指 DeepSeek / 本地）</label><input id="cf_openai_base" value="${esc(c.openai_base_url)}"></div>
      ${keyField('cf_anthropic_key','ANTHROPIC_API_KEY','Anthropic Key','sk-ant-...')}
      <div class="row2"><div class="field"><label>Ollama Base URL</label><input id="cf_ollama" value="${esc(c.ollama_base_url)}"></div>
        <div class="field"><label>temperature</label><input id="cf_temp" value="${esc(c.temperature)}"></div></div>
      <div class="toolrow"><button class="btn" onclick="saveSettings()">💾 保存</button><button class="btn ghost" onclick="testLLM()">🔌 测试连接</button></div>
      <div class="packet" id="cf_test" style="display:none"></div>
    </div>
    <div class="set-pane" data-st="chat">
      <div class="field"><label>你的名字（{{user}}）</label><input id="cf_pl_name" value="${esc((c.player&&c.player.name)||'你')}"></div>
      <div class="field"><label>你的人设（可空，让角色认得你）</label><textarea id="cf_pl_persona" rows="3">${esc((c.player&&c.player.persona)||'')}</textarea></div>
      <div class="toolrow"><button class="btn" onclick="savePlayer()">💾 保存身份</button></div>
      <p class="note">流式输出、世界书触发等行为，已默认开启 / 由引擎管理。</p>
    </div>
    <div class="set-pane" data-st="render">
      <div class="row2"><div class="field"><label>render</label><select id="cf_render">${opt(['none','gitee'],c.render)}</select></div>
        <div class="field"><label>图像尺寸</label><input id="cf_imgsize" value="${esc(c.image_size)}"></div></div>
      ${keyField('cf_gitee_key','GITEE_API_KEY','Gitee AI Key','Gitee z-image key')}
      <div class="toolrow"><button class="btn" onclick="saveSettings()">💾 保存</button></div>
    </div>
    <div class="set-pane" data-st="data">
      <table class="kv">
        <tr><td>LLM</td><td>${c.llm_available?`<span style="color:var(--good)">✓ ${esc(c.provider)}${c.model?' · '+esc(c.model):''}</span>`:'✗ stub（占位）'}</td></tr>
        <tr><td>渲染</td><td>${c.render==='gitee'&&sec('GITEE_API_KEY').set?'<span style="color:var(--good)">✓ gitee</span>':'✗ 未启用'}</td></tr>
        <tr><td>向量记忆</td><td>${esc(c.embed_provider||'none')}</td></tr>
        <tr><td>自演化</td><td>${c.simulate?'on':'off'}</td></tr>
        ${(c.env_overrides&&c.env_overrides.length)?`<tr><td>环境覆盖</td><td>${esc(c.env_overrides.join(', '))}</td></tr>`:''}
      </table>
      <p class="lead" style="margin-top:14px">完整数据管理（导入/导出/合并/枢纽/反思报告）在 <a href="/legacy" target="_blank" style="color:var(--violet)">创作者控制台</a>。密钥仅存本机，网页只绑 127.0.0.1。</p>

}
function settab(t){document.querySelectorAll('#settabs .set-tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');
  document.querySelectorAll('.set-pane').forEach(p=>p.classList.toggle('on',p.dataset.st===t.dataset.st));}
async function saveSettings(){const g=id=>{const e=el(id);return e?e.value.trim():'';};
  const body={SV_PROVIDER:g('cf_provider'),SV_MODEL:g('cf_model'),OPENAI_BASE_URL:g('cf_openai_base'),OLLAMA_BASE_URL:g('cf_ollama'),
    SV_LLM_TEMPERATURE:g('cf_temp'),SV_RENDER:g('cf_render'),SV_IMAGE_SIZE:g('cf_imgsize')};
  ['cf_openai_key:OPENAI_API_KEY','cf_anthropic_key:ANTHROPIC_API_KEY','cf_gitee_key:GITEE_API_KEY'].forEach(p=>{const[id,k]=p.split(':');const v=g(id);if(v)body[k]=v;});
  try{await post('/config',body);await refresh();renderNav('settings');toast('✓ 设置已保存，即时生效');}catch(e){toast('✗ '+e.message,true)}}
async function savePlayer(){try{await post('/player',{name:el('cf_pl_name').value.trim()||'你',persona:el('cf_pl_persona').value});toast('✓ 已保存你的身份');}catch(e){toast('✗ '+e.message,true)}}
async function clearSecret(k){if(!confirm('清除已存密钥 '+k+'?'))return;try{await post('/config',{[k]:''});await refresh();route();toast('✓ 已清除');}catch(e){toast('✗ '+e.message,true)}}
async function testLLM(){const box=el('cf_test');box.style.display='block';box.textContent='测试中…（先保存再测）';
  try{const r=await post('/llm-test',{});box.innerHTML=r.ok?`<b style="color:var(--good)">✓ ${esc(r.provider)}${r.stub?'（stub 占位）':''}</b>\n回复样本：${esc(r.sample)}`:`<b style="color:var(--bad)">✗ ${esc(r.provider)} 连接失败</b>\n${esc(r.error)}`;
  }catch(e){box.textContent='✗ '+e.message;}}

/* ===================== modal / forms ===================== */
function closeModal(){const o=document.querySelector('.overlay');if(o)o.remove();}
function openModal(html){closeModal();const o=document.createElement('div');o.className='overlay';
  o.onclick=e=>{if(e.target===o)closeModal();};o.innerHTML='<div class="modal">'+html+'</div>';document.body.appendChild(o);return o;}
function formModal(title,fields,submitLabel,onSubmit,aux){
  const body=fields.map(f=>{
    if(f.type==='select')return `<div class="field"><label>${esc(f.label)}</label><select id="f_${f.n}">${f.options.map(o=>`<option ${o===f.value?'selected':''}>${esc(o)}</option>`).join('')}</select></div>`;
    if(f.type==='textarea')return `<div class="field"><label>${esc(f.label)}</label><textarea id="f_${f.n}" rows="${f.rows||4}" placeholder="${esc(f.ph||'')}">${esc(f.value||'')}</textarea></div>`;
    return `<div class="field"><label>${esc(f.label)}</label><input id="f_${f.n}" placeholder="${esc(f.ph||'')}" value="${esc(f.value||'')}"></div>`;
  }).join('');
  const auxBtn=aux?`<button class="btn ghost" id="m_aux" style="margin-right:auto">${esc(aux.label)}</button>`:'';
  const o=openModal(`<h3>${esc(title)}</h3>${body}<div class="err" id="m_err"></div>
    <div class="modal-actions">${auxBtn}<button class="btn ghost" onclick="closeModal()">取消</button><button class="btn" id="m_ok">${esc(submitLabel)}</button></div>`);
  const vals=()=>{const v={};fields.forEach(f=>v[f.n]=o.querySelector('#f_'+f.n).value.trim());return v;};
  const setF=(n,val)=>{const e=o.querySelector('#f_'+n);if(e)e.value=val;};
  o.querySelector('#m_ok').onclick=async()=>{try{await onSubmit(vals());}catch(e){o.querySelector('#m_err').textContent='✗ '+e.message;}};
  if(aux){const ab=o.querySelector('#m_aux');ab.onclick=async()=>{const t0=ab.textContent;ab.textContent='生成中…';ab.disabled=true;
    try{await aux.run(vals(),setF);}catch(e){o.querySelector('#m_err').textContent='✗ '+e.message;}finally{ab.textContent=t0;ab.disabled=false;}};}
  return o;
}

/* ===================== actions ===================== */
function slug(s){return (s||'').toLowerCase().replace(/[^\w一-鿿]+/g,'-').replace(/^-+|-+$/g,'').slice(0,40)||('w'+Math.floor(performance.now()));}
async function actNewWorld(){formModal('新建作品（世界）',[
  {n:'name',label:'名字',ph:'如 夜行动物'},
  {n:'genre',label:'题材',ph:'如 都市校园 / 治愈'},
  {n:'world_md',label:'世界设定（可空，可后补）',type:'textarea',rows:4,ph:'这座城市有四百万人。凌晨三点，醒着的只有我们两个……'},
],'创建',async v=>{if(!v.name)throw new Error('起个名');
  const id=slug(v.name);await post('/world/create',{id,name:v.name,genre:v.genre,world_md:v.world_md});
  closeModal();await refresh();location.hash='#/worldbook/'+id;toast('✓ 已建《'+v.name+'》。接下来加角色（控制台）或写世界书。');},
  (OV.llm&&OV.llm.available)?{label:'✨ AI 生成设定',run:async(v,set)=>{const r=await post('/gen/world',{prompt:v.name+' '+v.genre,genre:v.genre});set('world_md',r.body||'');}}:null);}
async function actImportCard(){formModal('导入角色卡（SillyTavern）',[
  {n:'card',label:'粘贴卡 JSON（或用控制台传 PNG）',type:'textarea',rows:6,ph:'{ "name": "...", "description": "..." }'},
  {n:'world_name',label:'新世界名（留空用卡名）',ph:''},
],'导入',async v=>{if(!v.card)throw new Error('粘贴卡 JSON');
  const r=await post('/import/card',{card:v.card,target:'new',world_name:v.world_name||''});
  closeModal();await refresh();toast('✓ 已导入到新世界');location.hash='#/chat/'+(r.world||r.world_id||'');});}
async function actNewCodex(){const cats=(await api('/codex')).categories;formModal('新建元件',[
  {n:'category',label:'分类',type:'select',options:cats},
  {n:'id',label:'id（kebab-case）',ph:'如 sleepless-city'},
  {n:'summary',label:'一句话'},{n:'tags',label:'标签（逗号分隔）'},
],'创建',async v=>{await post('/codex/create',v);closeModal();route();toast('✓ 已加元件');});}
async function actSeedCodex(){try{const r=await post('/codex/seed',{});toast(`✓ 起始库：新增 ${r.added}，共 ${r.total}`);route();}catch(e){toast('✗ '+e.message,true)}}
async function actDelCodex(cat,id){if(!confirm(`删除元件 [${cat}] ${id}?`))return;try{await post('/delete/codex',{category:cat,id});closeModal();route();toast('✓ 已删');}catch(e){toast('✗ '+e.message,true)}}
async function actImportPreset(){formModal('导入 SillyTavern 预设',[{n:'name',label:'名字'},{n:'data',label:'预设 JSON',type:'textarea',rows:6}],'导入',
  async v=>{await post('/import/preset',{name:v.name,data:v.data});closeModal();route();toast('✓ 已导入预设');});}
async function actDelWorld(wid,name){if(!confirm(`删除作品「${name}」及其全部世界线/角色？并清理跨世界连接。不可撤销。`))return;
  try{await post('/delete/world',{id:wid});closeModal();await refresh();location.hash='#/works';toast('✓ 已删除');}catch(e){toast('✗ '+e.message,true)}}
async function actExtract(wid,eid,name){if(!confirm(`把 ${name} 提取/升华为跨世界的「魂」？\n她将获得跨世界不变量（声音/底线/身份记忆），从此可被召唤进别的世界。原世界的她照常存在。`))return;
  try{const r=await post('/extract',{world:wid,entity:eid});await refresh();toast(`✓ ${name} 已成魂（soul: ${esc(r.soul||r.soul_id||'')}）。现在可以「召唤进别的世界」了。`);route();}catch(e){toast('✗ '+e.message,true)}}
async function actSummonSoul(soul,name){const ids=OV.worlds.map(w=>w.id);if(!ids.length)return toast('还没有别的世界',true);
  formModal(`✦ 召唤 ${name} 降临别的世界`,[
    {n:'world',label:'目标世界',type:'select',options:ids},
    {n:'entry',label:'进入方式',type:'select',options:['本体进','换皮进']},
  ],'召唤 ✦',async v=>{const r=await post('/summon-soul',{soul,world:v.world,entry:v.entry});closeModal();await refresh();
    toast(`✦ ${name} 已降临《${v.world}》——带着记忆。`);location.hash='#/companion/'+v.world+'/'+(r.incarnation||r.as||r.entity||'');});}

/* ===================== farewell ===================== */
function openFarewell(wid,eid){ /* reserved for direct link */ route(); }

/* ===================== mascot / console ===================== */
function updateConsole(){const box=el('kbconsole');if(!box)return;
  if(CHAT&&location.hash.startsWith('#/chat')){const tok=CHAT.tok||0;box.textContent=`⌬ ≈${tok>=1000?(tok/1000).toFixed(1)+'k':tok} tok · ${CHAT.name||''}`;}
  else box.textContent=`⌬ ${OV.worlds.length} 世界 · ${OV.nexus.entities.length} 跨世界`;}
function kbSay(html){const s=el('kbsay');if(s)s.innerHTML=html;}
function kbLine(){          // 星瞳:看时段 + 看你在哪一页,说一句应景的话
  let h=12;try{h=new Date().getHours();}catch(e){}
  const greet=h<5?'夜深了':h<11?'早安':h<13?'午安':h<18?'下午好':h<23?'晚上好':'夜深了';
  const fam=(location.hash.slice(1).split('/').filter(Boolean)[0])||'works';
  const byPage={chat:'在听呢。<b>想让谁开口？</b>',companion:'她一直在的。<b>去陪陪她？</b>',
    novel:'笔还搁着。<b>续写哪一章？</b>',works:'想进哪个世界？<b>我带你去。</b>',
    chars:'这些住在你世界里的人，<b>想见见谁？</b>',worldbook:'设定我都替你记着。<b>要翻哪条？</b>',
    assets:'素材都在架上呢。',presets:'文风的旋钮在这儿。',settings:'要调点什么？'};
  return `${greet}。${byPage[fam]||'<b>要做点什么？</b>'}`;
}
function kbGo(fam,line){kbSay(line);setTimeout(()=>{location.hash='#/'+fam;const st=el('kbstage'),mn=el('kbmini');if(st)st.classList.remove('on');if(mn)mn.style.display='';},420);}
(function(){const mini=el('kbmini'),stage=el('kbstage'),close=el('kbclose');
  mini.onclick=()=>{stage.classList.add('on');mini.style.display='none';kbSay(kbLine());updateConsole();};
  close.onclick=()=>{stage.classList.remove('on');mini.style.display='';};})();

/* ===================== boot ===================== */
document.addEventListener('click',e=>{if(!e.target.closest('.navdrop'))document.querySelectorAll('.navdrop.open').forEach(d=>d.classList.remove('open'));});
window.addEventListener('hashchange',async()=>{await route();
  // companion → chat handoff
  if(window._pendingMsg&&CHAT&&CHAT.send){const m=window._pendingMsg;window._pendingMsg=null;setTimeout(()=>CHAT.send(m),120);}
});
(async()=>{try{await refresh();}catch(e){toast('✗ 无法连接后端：'+e.message,true);}await route();})();
