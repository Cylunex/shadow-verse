# ShadowVerse 暗宇宙引擎配置(KEY=VALUE,# 注释)—— 这是入库模板(无密钥)。
# 优先级:环境变量 > sv.local.conf(本机/网页设置面板写入,含密钥,gitignore) > 本文件 > 默认。
# 密钥别写这里(会入库)——用网页 ⚙ 设置 页填,或写进 sv.local.conf。

# 数据真相目录(默认项目根 universe/;可指向 workspace 数据区,与代码分离)
# SV_UNIVERSE_DIR=/path/to/universe

# ---- 体验透镜开关 ----
# 自演化(模拟透镜):能力已建,默认关。开启=世界你不在时自己跑
SV_SIMULATE=off
# 多模态渲染(可视化透镜):none | gitee。配 key 才点亮(零依赖 urllib)
SV_RENDER=none
# GITEE_API_KEY=
# SV_IMAGE_SIZE=1152x2048

# ---- 可插拔 LLM(闭合 AIGC 生成回路;单机一键造世界/写章才需要)----
# 默认 stub=关(返回占位)。作为 OpenClaw/Hermes skill 时不用配(生成走宿主模型)。
SV_PROVIDER=stub                 # stub | openai | anthropic | ollama
# SV_MODEL=                       # 留空各 provider 用默认(gpt-4o-mini / claude-sonnet-4-6 / qwen2.5)
# OPENAI_API_KEY=                 # openai/兼容端(可配 OPENAI_BASE_URL 指 deepseek/本地)
# OPENAI_BASE_URL=https://api.openai.com/v1
# ANTHROPIC_API_KEY=
# SV_LLM_TEMPERATURE=0.9

# ---- 叙事产线(narrate 透镜)----
# SV_HANZI_TARGET=2500
# SV_SUMMARY_EVERY=5

# ---- 向量记忆(远期,规模驱动才点亮;none=bigram 关键词,零回归)----
SV_EMBED_PROVIDER=none
# SV_EMBED_MODEL=bge-m3
# OLLAMA_BASE_URL=http://localhost:11434
